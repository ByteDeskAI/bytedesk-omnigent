asyncapi: 3.0.0
info:
  title: Omnigent Connected-App Events
  version: connected-app.v1
  description: Provider-neutral event catalog for Omnigent connected apps.
defaultContentType: application/json
channels:
  goalLifecycle:
    address: omnigent.connected-app.v1.goal.lifecycle
    messages:
      goalProgress:
        $ref: "#/components/messages/GoalProgress"
      goalCompleted:
        $ref: "#/components/messages/GoalCompleted"
      goalFailed:
        $ref: "#/components/messages/GoalFailed"
      goalCanceled:
        $ref: "#/components/messages/GoalCanceled"
      goalRetryScheduled:
        $ref: "#/components/messages/GoalRetryScheduled"
  goalApproval:
    address: omnigent.connected-app.v1.goal.approval
    messages:
      approvalRequested:
        $ref: "#/components/messages/ApprovalRequested"
      budgetRiskRequested:
        $ref: "#/components/messages/BudgetRiskRequested"
      approvalDecision:
        $ref: "#/components/messages/ApprovalDecision"
  goalTools:
    address: omnigent.connected-app.v1.goal.tools
    messages:
      toolStarted:
        $ref: "#/components/messages/ToolStarted"
      toolCompleted:
        $ref: "#/components/messages/ToolCompleted"
      toolFailed:
        $ref: "#/components/messages/ToolFailed"
operations:
  publishGoalProgress:
    action: send
    channel:
      $ref: "#/channels/goalLifecycle"
    messages:
      - $ref: "#/channels/goalLifecycle/messages/goalProgress"
  publishGoalCompleted:
    action: send
    channel:
      $ref: "#/channels/goalLifecycle"
    messages:
      - $ref: "#/channels/goalLifecycle/messages/goalCompleted"
  publishGoalFailed:
    action: send
    channel:
      $ref: "#/channels/goalLifecycle"
    messages:
      - $ref: "#/channels/goalLifecycle/messages/goalFailed"
  publishGoalCanceled:
    action: send
    channel:
      $ref: "#/channels/goalLifecycle"
    messages:
      - $ref: "#/channels/goalLifecycle/messages/goalCanceled"
  publishGoalRetryScheduled:
    action: send
    channel:
      $ref: "#/channels/goalLifecycle"
    messages:
      - $ref: "#/channels/goalLifecycle/messages/goalRetryScheduled"
  publishApprovalRequested:
    action: send
    channel:
      $ref: "#/channels/goalApproval"
    messages:
      - $ref: "#/channels/goalApproval/messages/approvalRequested"
  publishBudgetRiskRequested:
    action: send
    channel:
      $ref: "#/channels/goalApproval"
    messages:
      - $ref: "#/channels/goalApproval/messages/budgetRiskRequested"
  receiveApprovalDecision:
    action: receive
    channel:
      $ref: "#/channels/goalApproval"
    messages:
      - $ref: "#/channels/goalApproval/messages/approvalDecision"
  publishToolStarted:
    action: send
    channel:
      $ref: "#/channels/goalTools"
    messages:
      - $ref: "#/channels/goalTools/messages/toolStarted"
  publishToolCompleted:
    action: send
    channel:
      $ref: "#/channels/goalTools"
    messages:
      - $ref: "#/channels/goalTools/messages/toolCompleted"
  publishToolFailed:
    action: send
    channel:
      $ref: "#/channels/goalTools"
    messages:
      - $ref: "#/channels/goalTools/messages/toolFailed"
components:
  messages:
    GoalProgress:
      name: goal.progress
      payload:
        $ref: "#/components/schemas/GoalProgressEvent"
    GoalCompleted:
      name: goal.completed
      payload:
        $ref: "#/components/schemas/GoalCompletedEvent"
    GoalFailed:
      name: goal.failed
      payload:
        $ref: "#/components/schemas/GoalFailedEvent"
    GoalCanceled:
      name: goal.canceled
      payload:
        $ref: "#/components/schemas/GoalCanceledEvent"
    GoalRetryScheduled:
      name: goal.retry_scheduled
      payload:
        $ref: "#/components/schemas/GoalRetryScheduledEvent"
    ApprovalRequested:
      name: approval.requested
      payload:
        $ref: "#/components/schemas/ApprovalRequestedEvent"
    BudgetRiskRequested:
      name: budget_risk.requested
      payload:
        $ref: "#/components/schemas/BudgetRiskRequestedEvent"
    ApprovalDecision:
      name: approval.decision
      payload:
        $ref: "#/components/schemas/ApprovalDecisionEvent"
    ToolStarted:
      name: tool.started
      payload:
        $ref: "#/components/schemas/ToolEvent"
    ToolCompleted:
      name: tool.completed
      payload:
        $ref: "#/components/schemas/ToolEvent"
    ToolFailed:
      name: tool.failed
      payload:
        $ref: "#/components/schemas/ToolEvent"
  schemas:
    EventEnvelope:
      type: object
      required:
        - eventId
        - type
        - occurredAt
        - source
        - goalId
      properties:
        eventId:
          type: string
        type:
          type: string
        occurredAt:
          type: integer
          description: Epoch seconds.
        source:
          type: string
        tenantId:
          type:
            - string
            - "null"
        goalId:
          type: string
        targetKind:
          type: string
          enum:
            - organization
            - department
            - agent
        targetId:
          type:
            - string
            - "null"
        departmentSlug:
          type:
            - string
            - "null"
        outcomeKind:
          type:
            - string
            - "null"
          enum:
            - financial
            - roadmap
            - capability
            - risk
            - operational
            - null
        traceId:
          type:
            - string
            - "null"
        correlationId:
          type:
            - string
            - "null"
        idempotencyKey:
          type:
            - string
            - "null"
    GoalProgressEvent:
      allOf:
        - $ref: "#/components/schemas/EventEnvelope"
        - type: object
          required:
            - progress
          properties:
            progress:
              type: object
              additionalProperties: true
            message:
              type:
                - string
                - "null"
    GoalCompletedEvent:
      allOf:
        - $ref: "#/components/schemas/EventEnvelope"
        - type: object
          required:
            - realizedValueCents
          properties:
            realizedValueCents:
              type: integer
            evidence:
              type:
                - object
                - "null"
              additionalProperties: true
    GoalFailedEvent:
      allOf:
        - $ref: "#/components/schemas/EventEnvelope"
        - type: object
          required:
            - failureClass
            - retryable
          properties:
            failureClass:
              type: string
              enum:
                - agent
                - subagent
                - provider
                - budget
                - approval
                - system
            retryable:
              type: boolean
            detail:
              type:
                - string
                - "null"
    GoalCanceledEvent:
      allOf:
        - $ref: "#/components/schemas/EventEnvelope"
        - type: object
          properties:
            reason:
              type:
                - string
                - "null"
            canceledBy:
              type:
                - string
                - "null"
    GoalRetryScheduledEvent:
      allOf:
        - $ref: "#/components/schemas/EventEnvelope"
        - type: object
          required:
            - retryAt
            - attempt
          properties:
            retryAt:
              type: integer
              description: Epoch seconds.
            attempt:
              type: integer
              minimum: 1
            reason:
              type:
                - string
                - "null"
    ApprovalRequestedEvent:
      allOf:
        - $ref: "#/components/schemas/EventEnvelope"
        - type: object
          required:
            - reason
            - riskTier
          properties:
            reason:
              type: string
            riskTier:
              type: string
              enum:
                - low
                - medium
                - high
            approvalRef:
              type:
                - string
                - "null"
    BudgetRiskRequestedEvent:
      allOf:
        - $ref: "#/components/schemas/EventEnvelope"
        - type: object
          required:
            - requestedBudgetCents
            - currentBudgetCents
            - riskTier
          properties:
            requestedBudgetCents:
              type: integer
            currentBudgetCents:
              type: integer
            riskTier:
              type: string
              enum:
                - low
                - medium
                - high
            reason:
              type:
                - string
                - "null"
    ApprovalDecisionEvent:
      allOf:
        - $ref: "#/components/schemas/EventEnvelope"
        - type: object
          required:
            - approvalRef
            - decision
          properties:
            approvalRef:
              type: string
            decision:
              type: string
              enum:
                - approved
                - rejected
            decidedBy:
              type:
                - string
                - "null"
            reason:
              type:
                - string
                - "null"
    ToolEvent:
      allOf:
        - $ref: "#/components/schemas/EventEnvelope"
        - type: object
          required:
            - toolName
          properties:
            toolName:
              type: string
            toolCallId:
              type:
                - string
                - "null"
            arguments:
              type:
                - object
                - "null"
              additionalProperties: true
            output:
              type:
                - object
                - "null"
              additionalProperties: true
            failureClass:
              type:
                - string
                - "null"
              enum:
                - agent
                - subagent
                - provider
                - budget
                - approval
                - system
                - null
            retryable:
              type:
                - boolean
                - "null"
            detail:
              type:
                - string
                - "null"
