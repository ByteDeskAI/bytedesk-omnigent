# ByteDesk Omnigent — LOCAL-DEV overlay (source-mounted, prebuilt dependency image).
#
# WHY: omnigent installs editable (`uv pip install -e .`) with the venv's
# PEP-660 finder mapping `omnigent -> /build/omnigent` by absolute path
# (see __editable___omnigent_*_finder.py: MAPPING + "other nesting handled
# by importlib via the parent path", so NEW modules resolve too). So a
# hostPath mount of this repo at /build makes BOTH pods import the working
# tree — and harness subprocesses re-import per conversation, so bridge /
# executor edits hot-load with ZERO restart. Server-side edits (server/app.py
# seeding, routes) need a `kubectl rollout restart deploy/omnigent-server`
# (seconds), never an image rebuild.
#
# Local-dev uses ByteDesk-built dependency bases:
# localhost:32000/bytedesk-omnigent-server:local and
# localhost:32000/bytedesk-omnigent-host:local. They bake the venv plus system
# tools, so pod starts do not install dependencies. The omnigent PACKAGE still
# comes from the /build source mount, so code hot-loads without rebuilding.
#
# APPLY (local MicroK8s):
#   microk8s kubectl apply -k deploy/bytedesk/local-dev/
#
# SPA: the mount at /build shadows the baked bundle, so the SPA must be built
# into the tree (omnigent/server/static/web-ui, which the server serves).
#   One-shot:    cd ap-web && npm install && npm run build
#   Hot-reload:  cd ap-web && ./node_modules/.bin/vite build --watch
# The `--watch` build is the SPA analog of the server's watchfiles: it re-emits
# the bundle into the mounted static dir on every source change (~2-3s); refresh
# the browser to pick it up. One watcher feeds both pods (same hostPath). It is
# a FILE WATCHER, not a dev server (no `npm run dev`), so the single
# omnigent.bytedesk.localhost origin is preserved.
#
# Rebuild/push the local base images only when image dependencies change.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: bytedesk
resources:
  - ../k8s
  # Local-only ingress: http://omnigent.bytedesk.localhost -> omnigent-server.
  - omnigent-ingress.yaml

patches:
  # Source-mount the repo at /build (the editable-install import root) on the
  # server. Strategic merge: containers/volumes/volumeMounts merge by name, so
  # this appends `omnigent-src` without disturbing artifacts/config.
  - target:
      kind: Deployment
      name: omnigent-server
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: omnigent-server
      spec:
        template:
          spec:
            containers:
              - name: server
                # Auto-reload server code on .py change (watchfiles restarts the
                # in-pod process in seconds — no `rollout restart`). The image
                # entrypoint calls uvicorn.run(app_OBJECT,...) not a "module:app"
                # import string, so uvicorn --reload can't engage; wrapping the
                # whole process is the clean equivalent. --filter python ignores
                # the SPA bundle under static/web-ui. Harness subprocesses already
                # hot-reload (fresh import per conversation); this closes the gap
                # for the long-lived server (seeding, spec validation, catalog).
                #
                # Run the MOUNTED entrypoint (/build), not the baked image one
                # (/app): source-mounted dev imports current modules via
                # PYTHONPATH=/build, but the entrypoint is a script — running the
                # image copy would silently ignore source entrypoint changes
                # (e.g. the ARTIFACT_DIR→artifact-store factory routing that
                # selects the NATS Object Store, BDP-2380). Running /build keeps
                # the whole branch (entrypoint + modules) live in dev (BDP-2397).
                command:
                  - sh
                  - -c
                  - |
                    exec python /build/deploy/docker/entrypoint.py
                env:
                  # hostPath bind mounts don't always deliver inotify events into
                  # the container; polling is reliable across the mount boundary.
                  - name: WATCHFILES_FORCE_POLLING
                    value: "true"
                  # The local-dev ingress serves the UI from a *.localhost
                  # subdomain, but the WS CSWSH guard only treats exact
                  # "localhost"/loopback IPs as allowed in single-user local
                  # mode — so it 403s the terminal + session-updates WebSockets
                  # ("Bridge closed: code 1006"). Allowlist the ingress origin.
                  - name: OMNIGENT_WS_ALLOWED_ORIGINS
                    value: "http://omnigent.bytedesk.localhost,https://omnigent.dev.bytedesk.ai,https://mass-laptop01.taild12d8f.ts.net"
                  # The pods run as root; without this they write root-owned
                  # __pycache__/*.pyc into the /build hostPath (= this repo),
                  # which Ryan then can't manage. Disable bytecode caching so the
                  # source mount stays user-owned. Harmless: modules re-import
                  # per conversation anyway, so the .pyc cache buys ~nothing here.
                  - name: PYTHONDONTWRITEBYTECODE
                    value: "1"
                  # BDP-2294 (ADR-0143): the image's PEP-660 editable finder +
                  # entry_points.txt are baked PRE-mount, so the new top-level
                  # bytedesk_omnigent package isn't importable and its
                  # omnigent.extensions entry-point isn't registered in the source
                  # mount. PYTHONPATH=/build makes the package importable;
                  # OMNIGENT_EXTENSIONS registers it with the extension seam
                  # explicitly — no metadata regen / image rebuild needed.
                  - name: PYTHONPATH
                    value: /build
                  - name: OMNIGENT_EXTENSIONS
                    value: bytedesk_omnigent.extension:BytedeskExtension
                  # Sentry error/performance telemetry → self-hosted ByteDesk
                  # Observability (BDP-2550). Local-dev-only literal for the
                  # deterministic dev-seeded `omnigent` project. The path is an
                  # integer (/1), NOT the project GUID, because the official
                  # Python sentry-sdk rejects GUID project ids; the public key
                  # (a100000d, the dev-seeded key) is the credential and the
                  # ingest resolves the project from it. Prod instead populates
                  # OMNIGENT_SENTRY_DSN via the omnigent Infisical project (it
                  # flows in through the omnigent-infisical-secrets envFrom), so
                  # it is NOT set in the base manifests. traces=1.0 here so every
                  # request yields a transaction the smoke can see.
                  - name: OMNIGENT_SENTRY_DSN
                    value: "http://a100000d00000000000000000000000d@observability.bytedesk.svc.cluster.local/1"
                  - name: OMNIGENT_SENTRY_ENVIRONMENT
                    value: development
                  - name: OMNIGENT_SENTRY_TRACES_SAMPLE_RATE
                    value: "1.0"
                  # Accounts mode (multi-user login) for local dev. env merges by
                  # name, so this OVERRIDES the base server.yaml OMNIGENT_AUTH_ENABLED=0
                  # — but only in THIS local-dev overlay, which is never reconciled
                  # to prod, so the shared base (and prod) stay single-user. Needed so
                  # the BDP-2426 accounts fix, the /config admin UI (BDP-2416), and the
                  # host-pool-auth login path survive `apply -k`/`land` re-applies
                  # instead of resetting to 0 (BDP-2433). The cookie secret is NOT
                  # pinned here — the entrypoint's load_or_generate_cookie_secret
                  # auto-generates + persists it. base_url is https (the Cloudflare
                  # tunnel origin) so the session cookie is Secure/__Host-; log in via
                  # https://omnigent.dev.bytedesk.ai, not the http://*.localhost URL.
                  - name: OMNIGENT_AUTH_ENABLED
                    value: "true"
                  # The omnigent UI is embedded as a cross-origin iframe in Office
                  # chat. A SameSite=Lax cookie is NOT sent in a third-party frame,
                  # so the embedded UI's fetches + the WS /v1/sessions/updates
                  # upgrade lose the session cookie and 401/403 (UI stuck on
                  # "queued"). SameSite=None — paired with Secure, already required
                  # by the https base_url + __Host- prefix — lets the cookie ride in
                  # the embed (BDP-2501). Local-dev-only, like the accounts switch.
                  - name: OMNIGENT_COOKIE_SAMESITE
                    value: "none"
                  - name: OMNIGENT_ACCOUNTS_BASE_URL
                    value: https://omnigent.dev.bytedesk.ai
                  - name: OMNIGENT_ACCOUNTS_INIT_ADMIN_USERNAME
                    value: admin
                  # LOCAL-DEV-ONLY known admin credential — NOT a production secret
                  # (this overlay never ships to prod). Only used by bootstrap_admin
                  # on a fresh DB; an already-bootstrapped admin keeps its password.
                  - name: OMNIGENT_ACCOUNTS_INIT_ADMIN_PASSWORD
                    value: "ConfigAdmin2026!"
                readinessProbe:
                  initialDelaySeconds: 60
                  periodSeconds: 10
                livenessProbe:
                  initialDelaySeconds: 180
                  periodSeconds: 15
                  failureThreshold: 6
                volumeMounts:
                  - name: omnigent-src
                    mountPath: /build
            volumes:
              - name: omnigent-src
                hostPath:
                  path: /home/ryan/Documents/GitHub/ByteDeskAI/bytedesk-omnigent
                  type: Directory
  # Same mount on every host replica. Harness subprocesses spawned per
  # conversation import from /build -> grok/bridge edits hot-load with no roll.
  - target:
      kind: StatefulSet
      name: omnigent-host
    patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: omnigent-host
      spec:
        template:
          spec:
            containers:
              - name: host
                env:
                  # Root pods would otherwise write root-owned __pycache__/*.pyc
                  # into the /build hostPath (= this repo). Disable bytecode
                  # caching so the source mount stays user-owned (the harness
                  # re-imports per conversation, so the cache buys ~nothing).
                  - name: PYTHONDONTWRITEBYTECODE
                    value: "1"
                  # BDP-2294: harness subprocesses import bytedesk_omnigent modules
                  # from the source mount — make the new top-level package importable.
                  - name: PYTHONPATH
                    value: /build
                  # Sentry telemetry (BDP-2550). The host's own errors are minor,
                  # but the runner subprocess inherits this DSN via the host env
                  # allowlist (_RUNNER_ENV_ALLOWLIST) and reports as
                  # component=runner — so it MUST be present on the host pod.
                  # Local-dev-only literal (deterministic dev-seeded `omnigent`
                  # project; path is the integer /1, not the GUID, since the
                  # Python sentry-sdk rejects GUID project ids — the ingest
                  # resolves the project from the public key). Prod populates it
                  # via the omnigent Infisical project.
                  - name: OMNIGENT_SENTRY_DSN
                    value: "http://a100000d00000000000000000000000d@observability.bytedesk.svc.cluster.local/1"
                  - name: OMNIGENT_SENTRY_ENVIRONMENT
                    value: development
                  - name: OMNIGENT_SENTRY_TRACES_SAMPLE_RATE
                    value: "1.0"
                volumeMounts:
                  - name: omnigent-src
                    mountPath: /build
            volumes:
              - name: omnigent-src
                hostPath:
                  path: /home/ryan/Documents/GitHub/ByteDeskAI/bytedesk-omnigent
                  type: Directory
