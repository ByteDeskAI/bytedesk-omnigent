# Infisical-operator-managed system GitHub token for server-side Skills
# acquisition. The GitHub source adapter uses gh, and gh reads GH_TOKEN /
# GITHUB_TOKEN. Hydrate only this narrow token into omnigent-server; do not
# expose the GitHub App private key used by github-mcp.
#
# Source of truth: Infisical project `bytedesk-development`, environment
# `development` by default, path `/`, key `GITHUB_TOKEN`. The production Fleet
# overlay switches only the environment to `production`. The managed Kubernetes
# Secret presents it as GITHUB_TOKEN so gh can consume it directly.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: omnigent-github-token
  namespace: bytedesk
spec:
  authentication:
    universalAuth:
      credentialsRef:
        secretName: bytedesk-secrets
        secretNamespace: bytedesk
      secretsScope:
        envSlug: development
        projectSlug: bytedesk-development
        recursive: false
        secretsPath: /
  hostAPI: https://infisical.prod.bytedesk.ai/api
  managedKubeSecretReferences:
    - creationPolicy: Owner
      secretName: omnigent-github-token-secrets
      secretNamespace: bytedesk
      secretType: Opaque
      template:
        data:
          GITHUB_TOKEN: "{{ .GITHUB_TOKEN.Value }}"
        includeAllSecrets: false
  resyncInterval: 60
