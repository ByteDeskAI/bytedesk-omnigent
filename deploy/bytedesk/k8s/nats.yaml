# Omnigent NATS — single JetStream instance (BDP-2585 consolidation).
# Hosts BOTH the coordination plane (KV: presence, heal locks; runner transport
# omnigent.runtime.runner.*; host control via OMNIGENT_NATS_URL) AND the
# agent-bundle artifact Object Store (ARTIFACT_DIR=
# nats://omnigent-nats:4222/omnigent-artifacts). The earlier dedicated
# omnigent-nats-artifacts instance (BDP-2385) was consolidated away; the PVC is
# sized (10Gi) to hold both — coordination KV is tiny, artifacts dominate.
apiVersion: v1
kind: Service
metadata:
  name: omnigent-nats
  labels:
    app.kubernetes.io/name: omnigent-nats
spec:
  selector:
    app.kubernetes.io/name: omnigent-nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: omnigent-nats
  labels:
    app.kubernetes.io/name: omnigent-nats
spec:
  serviceName: omnigent-nats
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omnigent-nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omnigent-nats
    spec:
      containers:
        - name: nats
          image: nats:2.14.2-alpine3.22
          imagePullPolicy: IfNotPresent
          args:
            - "-js"
            - "-sd"
            - "/data"
            - "-m"
            - "8222"
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: jetstream-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        # Existing local/prod StatefulSets already use this claim-template name.
        # Kubernetes treats volumeClaimTemplates as immutable, so the name stays
        # stable. NOTE (BDP-2585): the size grew 2Gi -> 10Gi to absorb the
        # artifact Object Store; an EXISTING omnigent-nats StatefulSet must be
        # recreated (delete --cascade=orphan + expand/replace the PVC) since
        # volumeClaimTemplates can't be updated in place.
        name: jetstream-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
