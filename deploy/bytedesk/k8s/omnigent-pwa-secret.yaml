# Infisical-operator-managed Web Push (VAPID) credentials for omnigent-server.
#
# Standalone ap-web PWA push subscriptions require stable VAPID keys on the
# server (`OMNIGENT_VAPID_*`). Source of truth:
#   Infisical project `bytedesk-ai`, path `/omnigent-pwa`
#
# NEVER hand-create `omnigent-pwa-secrets` — the operator owns it
# (creationPolicy: Owner). Rotate by changing values in Infisical; the operator
# re-hydrates and omnigent-server pods pick them up on restart.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: omnigent-pwa
  namespace: bytedesk
spec:
  authentication:
    universalAuth:
      credentialsRef:
        secretName: bytedesk-secrets
        secretNamespace: bytedesk
      secretsScope:
        envSlug: development
        projectSlug: bytedesk-ai
        recursive: false
        secretsPath: /omnigent-pwa
  hostAPI: https://infisical.prod.bytedesk.ai/api
  managedSecretReference:
    creationPolicy: Owner
    secretName: omnigent-pwa-secrets
    secretNamespace: bytedesk
    secretType: Opaque
  resyncInterval: 60