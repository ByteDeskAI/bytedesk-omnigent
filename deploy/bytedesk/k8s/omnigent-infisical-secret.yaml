# Infisical-operator-managed bootstrap credentials for the InfisicalBackend
# (BDP-2303). The omnigent secret store's Infisical backend (default; local
# keyring fallback) authenticates with a universal-auth machine identity to READ
# the `bytedesk-agent-configuration` project, where agents' keychain:<name>
# secrets live.
#
# These bootstrap creds CANNOT live in that project (chicken-and-egg) — they are
# stored at a DIFFERENT path the operator can already reach and hydrated here:
#   Source of truth: Infisical project `bytedesk-ai`, path `/omnigent-infisical`
#   (identity currently `bytedesk-platform-runtime`, a viewer of the
#   bytedesk-agent-configuration project).
#
# envSlug is `development` in both clusters: the bootstrap identity credential is
# the SAME value regardless of which env the backend READS — the read target is
# selected by OMNIGENT_INFISICAL_ENV on the host (development in base, patched to
# production by the fleet/production overlay), not by this hydration.
#
# NEVER hand-create `omnigent-infisical-secrets` — the operator owns it
# (creationPolicy: Owner). Rotate by changing the value in Infisical; the
# operator re-hydrates and the host picks it up on restart.
#
# Mirrors omnigent-mcp-secret.yaml; the universal-auth machine-identity
# credentials the operator itself uses live in `bytedesk-secrets`.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: omnigent-infisical
  namespace: bytedesk
spec:
  authentication:
    universalAuth:
      credentialsRef:
        secretName: bytedesk-secrets
        secretNamespace: bytedesk
      secretsScope:
        envSlug: development
        projectSlug: bytedesk-ai
        recursive: false
        secretsPath: /omnigent-infisical
  hostAPI: https://infisical.prod.bytedesk.ai/api
  managedSecretReference:
    creationPolicy: Owner
    secretName: omnigent-infisical-secrets
    secretNamespace: bytedesk
    secretType: Opaque
  resyncInterval: 60
