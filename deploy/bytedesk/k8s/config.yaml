# Non-secret omnigent server config (the YAML `omnigent server -c` reads).
# Mounted at /etc/omnigent/config.yaml; server.yaml sets OMNIGENT_CONFIG to it.
# Secrets (DATABASE_URL, harness creds) stay in the Secret, never here.
#
# In prod the fleet overlay can replace this via a configMapGenerator from
# deploy/bytedesk/fleet/production/config/ (prod-correct values) — same pattern
# as OpenClaw's bytedesk-openclaw-config.
apiVersion: v1
kind: ConfigMap
metadata:
  name: omnigent-config
data:
  config.yaml: |
    # Durable agent-bundle storage on the NATS JetStream Object Store (BDP-2380,
    # ADR-0148): replica-shared + survives pod rolls, replacing the per-pod
    # emptyDir that vanished on every roll. The entrypoint is config-first, so
    # this — not the ARTIFACT_DIR env — is the authoritative value; it MUST match
    # ARTIFACT_DIR in server.yaml. A nats:// scheme selects the NATS Object Store
    # backend via the pluggable artifact-store factory. Consolidated onto the
    # single omnigent-nats JetStream instance (BDP-2585) — its 10Gi PVC holds
    # both the coordination KV and the artifact Object Store. Local cookie-secret
    # / agent-cache dirs still fall back to the container's /data/artifacts.
    artifact_location: nats://omnigent-nats:4222/omnigent-artifacts
    skills:
      default_search_sources:
        - skills
        - npm
        - github_marketplace
      github_marketplace:
        default_repos:
          - ByteDeskAI/bytedesk-marketplace
        default_ref: main
    # When auth is turned on, list operator identities here; a listed identity
    # is promoted to admin on login.
    # admins:
    #   - ryan@helms.ai
    # allowed_domains:
    #   - helms.ai
