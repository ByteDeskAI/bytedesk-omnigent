# Infisical-operator-managed secret for the BDP-2389 signed-principal seam.
# omnigent's ByteDeskPrincipalResolver (bytedesk_omnigent/auth/principal_resolver.py)
# registers ONLY when OMNIGENT_BYTEDESK_PRINCIPAL_SECRET is set; it must be the
# SAME HMAC secret the platform Office bridge mints X-Bytedesk-Principal with
# (Office Infisical key Omnigent__PrincipalSecret). A `kubectl set env` is wiped
# by the next localDev kustomize apply (BDP-2146), so the durable source is the
# Infisical operator, exactly like omnigent-bridge-config / omnigent-mcp.
#
#   Source of truth: the dedicated `ByteDesk Omnigent` Infisical project
#   (slug bytedesk-omnigent), env development, path / — the consolidated home
#   for omnigent configuration/secrets. The fleet/production overlay must patch
#   envSlug -> production and the prod project must carry the prod secret.
#
# NEVER hand-create `omnigent-principal-secrets` — the operator owns it
# (creationPolicy: Owner). Rotate by changing the value in Infisical; the
# operator re-hydrates and the rolling restart picks it up.
#
# Reuses the same operator machine identity (`bytedesk-secrets`) as the other
# omnigent InfisicalSecret CRs.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: omnigent-principal
  namespace: bytedesk
spec:
  authentication:
    universalAuth:
      credentialsRef:
        secretName: bytedesk-secrets
        secretNamespace: bytedesk
      secretsScope:
        envSlug: development
        projectSlug: bytedesk-omnigent
        recursive: false
        secretsPath: /
  hostAPI: https://infisical.prod.bytedesk.ai/api
  managedSecretReference:
    creationPolicy: Owner
    secretName: omnigent-principal-secrets
    secretNamespace: bytedesk
    secretType: Opaque
  resyncInterval: 60
