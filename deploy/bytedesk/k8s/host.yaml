# Omnigent HOST = the execution side. The server (server.yaml) is control-plane-only
# and never runs agents; a HOST dials in over the WS tunnel (/v1/hosts/{id}/tunnel),
# registers in the `hosts` table, and spawns runner subprocesses that execute agent
# turns. Deploying this makes the UI host menu show a connected host automatically
# ("prewired") — no manual `omni host` on a laptop.
#
# Image: the same public ghcr server image — it ships the full `omnigent` package
# (CLI + the pure-Python openai-agents/claude-sdk harnesses). Native CLI harnesses
# (claude-native/codex/pi) would need the `--target host` image's baked CLIs; for
# ByteDesk's openai-agents → Codex path the server image is sufficient.
#
# Connecting needs no model creds. When server auth is enabled, the host tunnel
# authenticates with OMNIGENT_HOST_AUTH_USERNAME/PASSWORD or
# OMNIGENT_HOST_AUTH_TOKEN from omnigent-host-credentials; when auth is disabled,
# it registers anonymously as the local user. Model creds are added only when we
# run a real turn (envFrom omnigent-host-credentials).
# Headless Service backing the StatefulSet (required for stable pod identity).
# The host dials OUT to the server over the WS tunnel and is never addressed
# inbound, so this Service exists only to satisfy the StatefulSet contract.
apiVersion: v1
kind: Service
metadata:
  name: omnigent-host
  labels:
    app.kubernetes.io/name: omnigent-host
    app.kubernetes.io/part-of: bytedesk-omnigent
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: omnigent-host
  ports:
    - name: noop
      port: 1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: omnigent-host
  labels:
    app.kubernetes.io/name: omnigent-host
    app.kubernetes.io/part-of: bytedesk-omnigent
spec:
  # Host pool with DETERMINISTIC identity (BDP-2398). A StatefulSet gives each
  # replica a STABLE ordinal pod name (omnigent-host-0, -1, ...) that
  # survives restarts/rollouts — unlike a Deployment, whose random pod-name
  # suffix changed every rollout and made each replica register as a NEW
  # (owner, name) row, growing the host picker without bound.
  #
  # OMNIGENT_HOST_NAME/ID below are derived from that ordinal pod name, so:
  #   - replicas=N  → exactly N hosts: omnigent-host-0 … omnigent-host-(N-1)
  #   - a restart/rollout reuses the SAME ordinal names → no new rows
  #   - scale with `kubectl -n bytedesk scale statefulset/omnigent-host --replicas=N`
  # Scaling DOWN leaves the high-ordinal rows behind as offline (expected;
  # scaling back up reclaims them). All replicas share ONE LLM-credential
  # Secret (envFrom below). Codex ChatGPT OAuth auth.json is single-consumer
  # refresh state, so the default Codex-capable pool is one host; scaling it
  # requires per-host auth sources or an enterprise Codex access-token flow.
  serviceName: omnigent-host
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omnigent-host
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omnigent-host
        app.kubernetes.io/part-of: bytedesk-omnigent
    spec:
      containers:
        - name: host
          # HOST-target image (public): bakes the claude/codex/pi CLIs + git/tmux/bwrap
          # + IS_SANDBOX, so ALL harnesses work (native CLI + pure-Python), not just
          # the server image's openai-agents/claude-sdk. This is the correct image for
          # an execution host.
          # ByteDesk-built host image (Dockerfile --target host): bakes the omnigent pkg
          # (incl. the grok-native harness) + claude/codex/pi/grok CLIs + git/tmux/bwrap.
          # Built locally to the MicroK8s registry; prod overlay → Harbor.
          image: localhost:32000/bytedesk-omnigent-host:local # image-managed
          imagePullPolicy: IfNotPresent
          # The native-terminal harnesses (claude-native/codex/pi) run the agent CLI
          # inside Omnigent's linux_bwrap sandbox, which needs CAP_SYS_ADMIN + unconfined
          # seccomp/AppArmor for its mount-namespace ops (bwrap failed with "make / slave:
          # Permission denied" otherwise). privileged is the simplest grant; the bytedesk
          # ns has no PodSecurity restriction. Tighten later to capabilities:[SYS_ADMIN] +
          # seccompProfile/AppArmor Unconfined if least-privilege is wanted. (Without this,
          # only the headless harnesses openai-agents/claude-sdk work — no bwrap needed.)
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              command -v bwrap >/dev/null 2>&1 || { echo "[host] missing bwrap in host image" >&2; exit 1; }
              command -v grok >/dev/null 2>&1 || { echo "[host] missing grok CLI in host image" >&2; exit 1; }
              # Codex OAuth: Codex reads its login state from ~/.codex/auth.json.
              # Keep that file in the host's persistent HOME so token refreshes
              # update the source of truth. The codex-auth Secret is a bootstrap
              # source only; never overwrite an existing ~/.codex/auth.json.
              mkdir -p "$HOME/.codex"
              if [ -f "$HOME/.codex/auth.json" ]; then
                chmod 600 "$HOME/.codex/auth.json" || true
                echo "[host] using existing codex auth.json from ~/.codex (subscription OAuth)";
              elif [ -f /etc/codex-auth/auth.json ]; then
                cp /etc/codex-auth/auth.json "$HOME/.codex/auth.json" && chmod 600 "$HOME/.codex/auth.json" && echo "[host] bootstrapped codex auth.json into ~/.codex (subscription OAuth)";
              else
                echo "[host] no codex auth.json mounted — codex harness unavailable until the codex-auth Secret is provided";
              fi
              # Grok OAuth = subscription auth in ~/.grok/auth.json (from
              # `grok login`); stage it into a WRITABLE ~/.grok so the CLI
              # refreshes in place.
              if [ -f /etc/grok-auth/auth.json ]; then
                mkdir -p "$HOME/.grok" && cp /etc/grok-auth/auth.json "$HOME/.grok/auth.json" && chmod 600 "$HOME/.grok/auth.json" && echo "[host] grok auth.json staged into ~/.grok (subscription OAuth)";
              else
                echo "[host] no grok auth.json mounted — grok harness unavailable until the grok-auth Secret is provided";
              fi
              # Grok TUI leader mode. The grok-native TUI-bridge needs the bare
              # `grok` TUI (launched per conversation in the Terminal panel) to
              # auto-spawn a SHARED leader at ~/.grok/leader.sock, so the harness
              # executor can attach over `agent stdio --leader-socket` and drive
              # the TUI's resident session (panel mirrors the chat). That is gated
              # ONLY by [cli] use_leader in config.toml — there is no env/CLI knob
              # for the top-level TUI — so ensure it before any TUI launches.
              GROK_CFG="$HOME/.grok/config.toml"; mkdir -p "$HOME/.grok"
              if ! grep -qE '^[[:space:]]*use_leader' "$GROK_CFG" 2>/dev/null; then
                if grep -qE '^\[cli\]' "$GROK_CFG" 2>/dev/null; then
                  sed -i 's/^\[cli\]/[cli]\nuse_leader = true/' "$GROK_CFG";
                else
                  printf '\n[cli]\nuse_leader = true\n' >> "$GROK_CFG";
                fi
                echo "[host] enabled grok [cli] use_leader=true (TUI leader mode for the bridge)";
              fi
              echo "[host] connecting to $OMNIGENT_SERVER_URL"
              exec omnigent host --server "$OMNIGENT_SERVER_URL"
          env:
            - name: OMNIGENT_SERVER_URL
              value: http://omnigent-server.bytedesk.svc.cluster.local
            # claude-sdk under root needs this; harmless for openai-agents.
            - name: IS_SANDBOX
              value: "1"
            # Deterministic host identity (BDP-2398) derived from the StatefulSet's
            # stable ordinal pod name (omnigent-host-0, -1, ...). omni-home is
            # persistent so auth/config refreshes survive restarts, but the env-
            # override path (omnigent/host/identity.py) remains the canonical host
            # identity so each ordinal reuses one row even before HOME is populated.
            # Both vars must be set together. $(POD_NAME) expands from the env var
            # defined just above (k8s dependent-env interpolation).
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OMNIGENT_HOST_NAME
              value: $(POD_NAME)
            - name: OMNIGENT_HOST_ID
              value: host_$(POD_NAME)
            # Writable HOME so the host can persist ~/.omnigent/config.yaml (its identity).
            - name: HOME
              value: /var/omni-home
            - name: OMNIGENT_CONFIG_HOME
              value: /var/omni-home/.omnigent
            - name: OMNIGENT_DATA_DIR
              value: /var/omni-home/data
            # Forward extra provider/gateway env to spawned runners beyond the
            # built-in HARNESS_CREDENTIAL_ENV_VARS (OPENAI_API_KEY/OPENAI_BASE_URL/
            # ANTHROPIC_*/GEMINI_API_KEY are forwarded by default). Add the
            # openai-agents wrap vars here if you use them instead of OPENAI_*.
            # OMNIGENT_EXTENSIONS and INFISICAL_*/OMNIGENT_INFISICAL_* are needed
            # so spawned runners load the ByteDesk extension and its InfisicalBackend
            # (BDP-2303), then resolve keychain:<name> agent creds from Infisical.
            # The two universal-auth secrets come from the operator-hydrated
            # omnigent-infisical-secrets Secret (envFrom below, see
            # omnigent-infisical-secret.yaml); OMNIGENT_NATS_URL comes from the
            # operator-hydrated omnigent-runtime-config-secrets Secret. All MUST
            # be in this list or the runner can't authenticate to Infisical / NATS
            # and falls back to its local keyring or fails NATS startup.
            - name: OMNIGENT_RUNNER_ENV_PASSTHROUGH
              value: "HARNESS_OPENAI_AGENTS_GATEWAY_BASE_URL,HARNESS_OPENAI_AGENTS_API_KEY,HARNESS_OPENAI_AGENTS_USE_RESPONSES,HARNESS_OPENAI_AGENTS_MODEL,BYTEDESK_IDENTITY_TOKEN_URL,OMNIGENT_MCP_CLIENT_SECRET,OMNIGENT_EXTENSIONS,OMNIGENT_NATS_URL,INFISICAL_UNIVERSAL_AUTH_CLIENT_ID,INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET,INFISICAL_HOST_URL,OMNIGENT_INFISICAL_PROJECT_SLUG,OMNIGENT_INFISICAL_ENV,AGENTIC_INBOX_MCP_URL,AGENTIC_INBOX_EMAIL_DOMAIN,AGENTIC_INBOX_CF_ACCESS_CLIENT_ID,AGENTIC_INBOX_CF_ACCESS_CLIENT_SECRET,GITHUB_MCP_URL"
            # ByteDesk platform MCP (BDP-2169/2182/2199): every agent's inline
            # bytedesk-platform MCP server references these ${VAR}s, expanded by
            # the runner at turn setup. Both names MUST be in the passthrough list
            # above so the spawned runner inherits them (else turn setup fails:
            # "Unresolved environment variable '${BYTEDESK_IDENTITY_TOKEN_URL}'").
            - name: BYTEDESK_IDENTITY_TOKEN_URL
              value: http://identity.bytedesk.svc.cluster.local/connect/token
            # GitHub App-backed MCP endpoint for engineering agents. Only this
            # URL is passed to spawned runners; App credentials stay in github-mcp.
            - name: GITHUB_MCP_URL
              value: http://github-mcp.bytedesk.svc.cluster.local/mcp
            # Explicitly load ByteDesk's extension on hosts and spawned runners.
            # Production images also register the entry-point; this env keeps
            # source-mounted local-dev and host-spawned runner processes aligned.
            - name: OMNIGENT_EXTENSIONS
              value: bytedesk_omnigent.extension:BytedeskExtension
            # InfisicalBackend (BDP-2303) non-secret config. The CLIENT_ID/SECRET
            # arrive via the operator-hydrated omnigent-infisical-secrets Secret
            # (envFrom below). Base = local MicroK8s → envSlug development; the prod
            # fleet overlay patches OMNIGENT_INFISICAL_ENV → production.
            - name: INFISICAL_HOST_URL
              value: https://infisical.prod.bytedesk.ai
            - name: OMNIGENT_INFISICAL_PROJECT_SLUG
              value: bytedesk-agent-configuration
            - name: OMNIGENT_INFISICAL_ENV
              value: development
          # SHARED host-pool credentials — ONE Secret, every host replica gets it.
          # Put OMNIGENT_HOST_AUTH_USERNAME/PASSWORD or OMNIGENT_HOST_AUTH_TOKEN
          # here when server auth is enabled; put LLM/provider keys here for every
          # runner/agent the host spawns. optional so unauthenticated local-dev
          # servers can still connect before credentials are present.
          envFrom:
            - secretRef:
                name: omnigent-host-credentials
                optional: true
            # OMNIGENT_MCP_CLIENT_SECRET for the bytedesk-platform MCP oauth
            # client_credentials grant (BDP-2182/2199). Forwarded to runners via
            # the passthrough list above.
            - secretRef:
                name: omnigent-mcp-secrets
                optional: true
            # InfisicalBackend (BDP-2303) bootstrap creds — universal-auth machine
            # identity that READS the bytedesk-agent-configuration project. Operator-
            # hydrated from Infisical bytedesk-ai /omnigent-infisical (see
            # omnigent-infisical-secret.yaml). optional so the host boots before the
            # operator hydrates; the backend then falls back to its local keyring.
            - secretRef:
                name: omnigent-infisical-secrets
                optional: true
            # Agentic Inbox MCP config for persona agents, hydrated from
            # Infisical bytedesk-agent-configuration /agentic-inbox. These env
            # names are forwarded to spawned runners by
            # OMNIGENT_RUNNER_ENV_PASSTHROUGH above.
            - secretRef:
                name: agentic-inbox-config-secrets
                optional: true
            # Runtime config such as OMNIGENT_NATS_URL, hydrated from Infisical
            # bytedesk-agent-configuration /runtime and forwarded to spawned
            # runners by OMNIGENT_RUNNER_ENV_PASSTHROUGH above.
            - secretRef:
                name: omnigent-runtime-config-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              # A host runs the host process + one harness subprocess PER active
              # conversation, and (for caller_process/sandbox:none agents like
              # Maya) each agent's own shell/python tool work runs IN-POD too. A
              # long multi-agent delegation (orchestrator + spawned specialist
              # scraping the web) is several hundred MB per subprocess. Reserve
              # 1Gi so the scheduler keeps real headroom for that fan-out.
              memory: 1Gi
            limits:
              cpu: "2"
              # Raised 2Gi -> 8Gi (BDP-2206): the 2Gi cap OOMKilled (exit 137)
              # the pod mid-delegation, killing the host's WS tunnel and every
              # in-flight runner/turn — so long delegations never completed and
              # turns failed silently. 8Gi fits an orchestrator + spawned
              # children + their in-pod tool subprocesses. Node has ample RAM
              # and there is no namespace ResourceQuota, so the default 1 x 8Gi is
              # comfortably schedulable.
              memory: 8Gi
          volumeMounts:
            - name: omni-home
              mountPath: /var/omni-home
            # Codex OAuth credential (from `codex login`). optional: host runs
            # without it; codex harness becomes usable once the Secret exists.
            - name: codex-auth
              mountPath: /etc/codex-auth
              readOnly: true
            - name: grok-auth
              mountPath: /etc/grok-auth
              readOnly: true
      volumes:
        - name: codex-auth
          secret:
            secretName: codex-auth
            optional: true
        - name: grok-auth
          secret:
            secretName: grok-auth
            optional: true
  volumeClaimTemplates:
    - metadata:
        name: omni-home
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
