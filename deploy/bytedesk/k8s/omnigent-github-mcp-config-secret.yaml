# Infisical-operator-managed GitHub App credentials for the GitHub MCP service.
#
# Source of truth: Infisical project `bytedesk-agent-configuration`,
# path `/github-mcp`.
#   • LOCAL/DEV: envSlug `development` (this base).
#   • PROD     : the fleet/production overlay patches envSlug -> `production`.
#
# Expected keys:
#   GITHUB_APP_ID
#   GITHUB_APP_CLIENT_ID
#   GITHUB_APP_CLIENT_SECRET
#   GITHUB_APP_INSTALLATION_ID
#   GITHUB_APP_OWNER
#   GITHUB_APP_PRIVATE_KEY
#
# Only the github-mcp Deployment consumes this secret. Agents receive
# GITHUB_MCP_URL only, so the App private key never enters agent images or
# spawned runner environments.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: omnigent-github-mcp-config
  namespace: bytedesk
spec:
  authentication:
    universalAuth:
      credentialsRef:
        secretName: bytedesk-secrets
        secretNamespace: bytedesk
      secretsScope:
        envSlug: development
        projectSlug: bytedesk-agent-configuration
        recursive: false
        secretsPath: /github-mcp
  hostAPI: https://infisical.prod.bytedesk.ai/api
  managedSecretReference:
    creationPolicy: Owner
    secretName: github-mcp-config-secrets
    secretNamespace: bytedesk
    secretType: Opaque
  resyncInterval: 60
