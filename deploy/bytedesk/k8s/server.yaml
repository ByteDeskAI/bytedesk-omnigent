# Omnigent SERVER = control plane only. Per deploy/docker/entrypoint.py it runs
# in "external runners only" mode: it persists sessions/agents/policies, serves
# the SPA + REST/SSE API, accepts runner WebSocket tunnels at /v1/runner/tunnel,
# and NEVER executes agents itself. Agents run on the RUNNER (runner.yaml).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: omnigent-artifacts
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: omnigent-server
  labels:
    app.kubernetes.io/name: omnigent-server
spec:
  selector:
    app.kubernetes.io/name: omnigent-server
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnigent-server
  labels:
    app.kubernetes.io/name: omnigent-server
spec:
  # MUST stay 1 — the server uses an in-memory runner registry; >1 replica is
  # unsupported until a shared registry (e.g. Redis) is added. (One of the gaps
  # to build before omnigent can fully replace OpenClaw at scale.)
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: omnigent-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omnigent-server
    spec:
      # imagePullSecrets is added by the prod fleet overlay (harbor-prod-pull-secret).
      # Local MicroK8s pulls from localhost:32000 (no secret needed).
      containers:
        - name: server
          # The `# image-managed` marker is what the prod fleet overlay's
          # `images:` rewrite + TeamCity fleet-update-omnigent.sh target.
          image: localhost:32000/bytedesk-omnigent-server:local # image-managed (Dockerfile default/runtime target)
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/entrypoint.py"] # Dockerfile bakes the entrypoint here (COPY deploy/docker/entrypoint.py /app/entrypoint.py)
          envFrom:
            - secretRef:
                name: omnigent-secrets # DATABASE_URL (+ cookie secret if auth on)
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: ARTIFACT_DIR
              value: /data/artifacts
            - name: OMNIGENT_CONFIG
              value: /etc/omnigent/config.yaml
            # Phase 0: no login, single "local" user — fine for an internal,
            # in-cluster / port-forwarded smoke. Flip to OIDC (Google Workspace)
            # for a shared instance.
            - name: OMNIGENT_AUTH_ENABLED
              value: "0"
            # ByteDesk platform MCP auth (BDP-2169, ADR-0138). Maya's
            # `bytedesk-platform` MCP tool uses the generic `oauth`
            # client-credentials provider (BDP-2182), which mints + refreshes a
            # JWT against ByteDesk.Identity at connection time. token_url is
            # non-secret in-cluster DNS (plain env); the client secret is
            # Infisical-operator-managed (omnigent-mcp-secrets ← /omnigent-mcp).
            # optional: true so a not-yet-hydrated secret degrades to "Maya's
            # MCP tool unavailable" (her config parse skips, logged) rather than
            # blocking the whole server.
            - name: BYTEDESK_IDENTITY_TOKEN_URL
              value: http://identity/connect/token
            - name: OMNIGENT_MCP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: omnigent-mcp-secrets
                  key: OMNIGENT_MCP_CLIENT_SECRET
                  optional: true
            # Built-in agents the new-session picker (GET /v1/agents) seeds at
            # startup, ON TOP OF the packaged set (claude-native-ui, codex-native-ui,
            # polly). Each os.pathsep(:)-separated entry is ONE bundle dir — the
            # loader does NOT scan a parent folder — registered as a built-in under
            # the dir name (server/app.py _ensure_extra_builtin_agents). Without
            # this the ByteDesk team is invisible in the picker (the BDP-2146
            # durable-seeding gap: a one-off `kubectl set env` was wiped by every
            # rollout/apply). Seeding is content-aware + idempotent, so a redeploy
            # refreshes a changed spec; a missing/stale entry is logged and skipped,
            # never blocking startup — so this list is safe even where a bundle
            # isn't present.
            #
            # Path = /build/deploy/bytedesk/agents/<id>: /build is the source-mount
            # root in BOTH environments — the local-dev overlay hostPath-mounts this
            # repo at /build, and the prod fork image (infra/docker/bytedesk-omnigent/
            # Dockerfile, see deploy/bytedesk/README.md "Productionize") bakes
            # deploy/bytedesk/agents at /build. KEEP THIS LIST IN SYNC when you add
            # or remove a persona bundle under deploy/bytedesk/agents/. (Excludes the
            # phase-0 scaffolds bytedesk-orchestrator / bytedesk-engineer /
            # platform-developer, which are templates, not picker personas.)
            # inbox-demo is the reference inbox-workflow sample (BDP-2171). The 45
            # BDP-2180 workflow orchestrators (params.workflow: true) are also listed so
            # the whole automation suite is runnable straight from the picker.
            - name: OMNIGENT_BUILTIN_AGENT_DIRS
              value: "/build/deploy/bytedesk/agents/chief-of-staff:/build/deploy/bytedesk/agents/backend-development-lead:/build/deploy/bytedesk/agents/brand-and-creative-director:/build/deploy/bytedesk/agents/bytedesk-platform-developer:/build/deploy/bytedesk/agents/client-research-lead:/build/deploy/bytedesk/agents/content-marketing-lead:/build/deploy/bytedesk/agents/customer-success-and-support-lead:/build/deploy/bytedesk/agents/delivery-manager:/build/deploy/bytedesk/agents/devex-and-docs-lead:/build/deploy/bytedesk/agents/devprojects-support-resolver:/build/deploy/bytedesk/agents/hr-org-designer:/build/deploy/bytedesk/agents/icp-scoring-analyst:/build/deploy/bytedesk/agents/lifecycle-email-marketing-lead:/build/deploy/bytedesk/agents/marketing-director:/build/deploy/bytedesk/agents/outreach-intelligence-specialist:/build/deploy/bytedesk/agents/platform-architect:/build/deploy/bytedesk/agents/product-ops-director:/build/deploy/bytedesk/agents/prospect-source-mapper:/build/deploy/bytedesk/agents/quality-and-release-lead:/build/deploy/bytedesk/agents/revops-and-kpi-manager:/build/deploy/bytedesk/agents/sales-enablement-lead:/build/deploy/bytedesk/agents/seo-geo-growth-lead:/build/deploy/bytedesk/agents/video-content-producer:/build/deploy/bytedesk/agents/web-design-director:/build/deploy/bytedesk/agents/web-development-lead:/build/deploy/bytedesk/agents/inbox-demo:/build/deploy/bytedesk/agents/activation-flow-spec-pipeline:/build/deploy/bytedesk/agents/agent-org-health-review:/build/deploy/bytedesk/agents/agent-workload-rebalance:/build/deploy/bytedesk/agents/client-onboarding-drive-provisioning:/build/deploy/bytedesk/agents/coordination-failure-detector:/build/deploy/bytedesk/agents/delivery-sequencing-standup:/build/deploy/bytedesk/agents/demo-experience-builder:/build/deploy/bytedesk/agents/demo-to-close-pipeline:/build/deploy/bytedesk/agents/demo-video-and-launch-asset-factory:/build/deploy/bytedesk/agents/design-system-activation-review:/build/deploy/bytedesk/agents/devproject-change-request:/build/deploy/bytedesk/agents/devprojects-demo-asset-factory:/build/deploy/bytedesk/agents/devprojects-deploy-reliability-watch:/build/deploy/bytedesk/agents/devprojects-seo-positioning-engine:/build/deploy/bytedesk/agents/engineering-runbook-and-mcp-docs-factory:/build/deploy/bytedesk/agents/escalation-incident-bridge:/build/deploy/bytedesk/agents/first-customer-roadmap-triage:/build/deploy/bytedesk/agents/first-customer-warroom:/build/deploy/bytedesk/agents/geo-cited-content-pipeline:/build/deploy/bytedesk/agents/goal-triage-router:/build/deploy/bytedesk/agents/icp-prospect-pipeline:/build/deploy/bytedesk/agents/new-agent-onboarding:/build/deploy/bytedesk/agents/onboarding-to-first-value:/build/deploy/bytedesk/agents/outreach-drafting-pipeline:/build/deploy/bytedesk/agents/release-readiness-quality-gate:/build/deploy/bytedesk/agents/request-intake-spec-synthesizer:/build/deploy/bytedesk/agents/research-triage-handoff:/build/deploy/bytedesk/agents/retention-risk-radar:/build/deploy/bytedesk/agents/revops-kpi-cockpit:/build/deploy/bytedesk/agents/role-clarity-ownership-map:/build/deploy/bytedesk/agents/seo-geo-growth-program:/build/deploy/bytedesk/agents/signup-to-first-value-lifecycle:/build/deploy/bytedesk/agents/source-map-coverage-sweep:/build/deploy/bytedesk/agents/stripe-billing-go-live-gate:/build/deploy/bytedesk/agents/stripe-go-live-billing:/build/deploy/bytedesk/agents/support-to-delivery-ticket-bridge:/build/deploy/bytedesk/agents/support-triage-resolution:/build/deploy/bytedesk/agents/target-account-intel-pack:/build/deploy/bytedesk/agents/trial-activation-first-value:/build/deploy/bytedesk/agents/wedge-bet-deliberation:/build/deploy/bytedesk/agents/wedge-fit-account-brief:/build/deploy/bytedesk/agents/wedge-strategy-deliberation:/build/deploy/bytedesk/agents/weekly-architecture-audit:/build/deploy/bytedesk/agents/weekly-business-review:/build/deploy/bytedesk/agents/weekly-mission-kpi-reporting"
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            # First boot runs Alembic migrations before listening — give it room.
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: artifacts
              mountPath: /data/artifacts
            - name: config
              mountPath: /etc/omnigent
              readOnly: true
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: omnigent-artifacts
        - name: config
          configMap:
            name: omnigent-config
