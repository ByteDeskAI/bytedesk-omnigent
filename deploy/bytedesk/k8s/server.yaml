# Omnigent SERVER = control plane only. Per deploy/docker/entrypoint.py it runs
# in "external runners only" mode: it persists sessions/agents/policies, serves
# the SPA + REST/SSE API, coordinates runners through the configured transport,
# and NEVER executes agents itself. Agents run on the RUNNER (runner.yaml).
apiVersion: v1
kind: Service
metadata:
  name: omnigent-server
  labels:
    app.kubernetes.io/name: omnigent-server
spec:
  selector:
    app.kubernetes.io/name: omnigent-server
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnigent-server
  labels:
    app.kubernetes.io/name: omnigent-server
spec:
  # Multi-replica HA requires OMNIGENT_NATS_URL (coordination backplane).
  # Artifacts (agent bundles) are stored durably in the consolidated Omnigent
  # NATS JetStream Object Store — see ARTIFACT_DIR below — so every replica
  # shares one store.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: omnigent-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omnigent-server
    spec:
      serviceAccountName: omnigent-server
      # imagePullSecrets is added by the prod fleet overlay (harbor-prod-pull-secret).
      # Local MicroK8s pulls from localhost:32000 (no secret needed).
      containers:
        - name: server
          # The `# image-managed` marker is what the prod fleet overlay's
          # `images:` rewrite + TeamCity fleet-update-omnigent.sh target.
          image: localhost:32000/bytedesk-omnigent-server:local # image-managed (Dockerfile default/runtime target)
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/entrypoint.py"] # Dockerfile bakes the entrypoint here (COPY deploy/docker/entrypoint.py /app/entrypoint.py)
          envFrom:
            - secretRef:
                name: omnigent-secrets # DATABASE_URL (+ cookie secret if auth on)
            # BDP-2301 — BYTEDESK_TENANT_ID for the realtime agent bridge,
            # hydrated from Infisical bytedesk-agent-configuration /realtime by
            # the omnigent-bridge-config InfisicalSecret CR.
            - secretRef:
                name: omnigent-bridge-config-secrets
            # Agentic Inbox MCP config + webhook verification secret, hydrated
            # from Infisical bytedesk-agent-configuration /agentic-inbox.
            - secretRef:
                name: agentic-inbox-config-secrets
                optional: true
            # Runtime config such as OMNIGENT_NATS_URL is hydrated from
            # Infisical bytedesk-agent-configuration /runtime. The NATS URL is
            # deployment config, not an agent-spec field.
            - secretRef:
                name: omnigent-runtime-config-secrets
                optional: true
            # InfisicalBackend (BDP-2303) bootstrap creds. The Skills GitHub
            # adapter resolves GITHUB_TOKEN through Omnigent's secret backend
            # and passes it only to gh's isolated command environment.
            - secretRef:
                name: omnigent-infisical-secrets
                optional: true
            # System GitHub token for server-side Skills GitHub acquisition.
            # Infisical operator maps bytedesk-development / GITHUB_TOKEN into
            # GITHUB_TOKEN for gh only.
            - secretRef:
                name: omnigent-github-token-secrets
                optional: true
            # Web Push (VAPID) for standalone PWA notifications when the tab is
            # closed. Infisical-operator-managed (omnigent-pwa-secrets ←
            # bytedesk-ai /omnigent-pwa).
            - secretRef:
                name: omnigent-pwa-secrets
                optional: true
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            # The cron scheduler re-enters the existing session-create path
            # through the server's own HTTP API when firing scheduled work.
            - name: OMNIGENT_SELF_BASE_URL
              value: http://127.0.0.1:8000
            # Durable, replica-shared agent-bundle storage over NATS JetStream
            # Object Store (BDP-2380, ADR-0148). The entrypoint routes a
            # nats:// location through the pluggable artifact-store factory to
            # NatsObjectStoreArtifactStore. Replaces the per-pod emptyDir that
            # every roll wiped (durable Postgres row → vanished bundle →
            # "unable to load agent spec"). Bucket auto-creates on first use.
            - name: ARTIFACT_DIR
              value: nats://omnigent-nats:4222/omnigent-artifacts
            - name: OMNIGENT_CONFIG
              value: /etc/omnigent/config.yaml
            # Phase 0: no login, single "local" user — fine for an internal,
            # in-cluster / port-forwarded smoke. Flip to OIDC for a shared
            # instance.
            - name: OMNIGENT_AUTH_ENABLED
              value: "0"
            # Coordination backplane URL comes from omnigent-runtime-config-secrets
            # (Infisical /runtime) so server, host, and spawned runners share one
            # runtime-config source of truth.
            # Admin-only Omni CLI terminal. The UI attaches to the server, and
            # the server execs into the dedicated StatefulSet pod
            # `omnigent-cli-0` using the narrowly-scoped ServiceAccount below.
            - name: OMNIGENT_OMNI_CLI_TERMINAL_ENABLED
              value: "1"
            - name: OMNIGENT_OMNI_CLI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OMNIGENT_OMNI_CLI_POD_NAME
              value: omnigent-cli-0
            - name: OMNIGENT_OMNI_CLI_CONTAINER
              value: cli
            - name: OMNIGENT_OMNI_CLI_SERVER_URL
              value: http://omnigent-server.bytedesk.svc.cluster.local
            # ByteDesk platform MCP auth (BDP-2169, ADR-0138). Maya's
            # `bytedesk-platform` MCP tool uses the generic `oauth`
            # client-credentials provider (BDP-2182), which mints + refreshes a
            # JWT against ByteDesk.Identity at connection time. token_url is
            # non-secret in-cluster DNS (plain env); the client secret is
            # Infisical-operator-managed (omnigent-mcp-secrets ← /omnigent-mcp).
            # optional: true so a not-yet-hydrated secret degrades to "Maya's
            # MCP tool unavailable" (her config parse skips, logged) rather than
            # blocking the whole server.
            - name: BYTEDESK_IDENTITY_TOKEN_URL
              value: http://identity/connect/token
            # GitHub App-backed MCP endpoint. Secret GitHub App material lives
            # only in github-mcp; agent images and runners receive this URL.
            - name: GITHUB_MCP_URL
              value: http://github-mcp.bytedesk.svc.cluster.local/mcp
            # Extension + InfisicalBackend config for server-side integrations
            # such as Skills GitHub acquisition. Entry points cover production
            # images; the env keeps source-mounted localDev pods aligned.
            - name: OMNIGENT_EXTENSIONS
              value: bytedesk_omnigent.extension:BytedeskExtension
            - name: INFISICAL_HOST_URL
              value: https://infisical.prod.bytedesk.ai
            - name: OMNIGENT_INFISICAL_PROJECT_SLUG
              value: bytedesk-agent-configuration
            - name: OMNIGENT_INFISICAL_ENV
              value: development
            - name: OMNIGENT_MCP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: omnigent-mcp-secrets
                  key: OMNIGENT_MCP_CLIENT_SECRET
                  optional: true
            # BDP-2389 — shared HMAC secret for the signed X-Bytedesk-Principal
            # seam. ByteDeskPrincipalResolver registers ONLY when this is set;
            # must equal the platform Office bridge's Omnigent__PrincipalSecret.
            # Infisical-operator-managed (omnigent-principal-secrets ← the
            # dedicated `bytedesk-omnigent` project, path /). optional: true so a
            # not-yet-hydrated secret degrades to the legacy header-mode auth
            # (the resolver simply isn't registered) rather than blocking boot.
            - name: OMNIGENT_BYTEDESK_PRINCIPAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: omnigent-principal-secrets
                  key: OMNIGENT_BYTEDESK_PRINCIPAL_SECRET
                  optional: true
            # Built-in agents the new-session picker (GET /v1/agents) seeds at
            # startup, ON TOP OF the packaged set (claude-native-ui, codex-native-ui,
            # polly). Each os.pathsep(:)-separated entry is ONE bundle dir — the
            # loader does NOT scan a parent folder — registered as a built-in under
            # the dir name (server/app.py _ensure_extra_builtin_agents). Without
            # this the ByteDesk team is invisible in the picker (the BDP-2146
            # durable-seeding gap: a one-off `kubectl set env` was wiped by every
            # rollout/apply). Seeding is content-aware + idempotent, so a redeploy
            # refreshes a changed spec; a missing/stale entry is logged and skipped,
            # never blocking startup — so this list is safe even where a bundle
            # isn't present.
            #
            # Path = /build/deploy/bytedesk/agents/<id>: /build is the source-mount
            # root in BOTH environments — the local-dev overlay hostPath-mounts this
            # repo at /build, and the prod fork image (infra/docker/bytedesk-omnigent/
            # Dockerfile, see deploy/bytedesk/README.md "Productionize") bakes
            # deploy/bytedesk/agents at /build. KEEP THIS LIST IN SYNC when you add
            # or remove a persona bundle under deploy/bytedesk/agents/. (Excludes the
            # phase-0 scaffolds bytedesk-orchestrator / bytedesk-engineer /
            # platform-developer, which are templates, not picker personas.)
            # inbox-demo is the reference inbox-workflow sample (BDP-2171). Workflow
            # orchestrators (params.workflow: true) are also listed so the whole
            # automation suite is runnable straight from the picker.
            - name: OMNIGENT_BUILTIN_AGENT_DIRS
              value: "/build/deploy/bytedesk/agents/chief-of-staff:/build/deploy/bytedesk/agents/backend-development-lead:/build/deploy/bytedesk/agents/brand-and-creative-director:/build/deploy/bytedesk/agents/bytedesk-platform-developer:/build/deploy/bytedesk/agents/client-research-lead:/build/deploy/bytedesk/agents/content-marketing-lead:/build/deploy/bytedesk/agents/customer-success-and-support-lead:/build/deploy/bytedesk/agents/delivery-manager:/build/deploy/bytedesk/agents/devex-and-docs-lead:/build/deploy/bytedesk/agents/devprojects-support-resolver:/build/deploy/bytedesk/agents/hr-org-designer:/build/deploy/bytedesk/agents/icp-scoring-analyst:/build/deploy/bytedesk/agents/lifecycle-email-marketing-lead:/build/deploy/bytedesk/agents/marketing-director:/build/deploy/bytedesk/agents/outreach-intelligence-specialist:/build/deploy/bytedesk/agents/platform-architect:/build/deploy/bytedesk/agents/product-ops-director:/build/deploy/bytedesk/agents/prospect-source-mapper:/build/deploy/bytedesk/agents/quality-and-release-lead:/build/deploy/bytedesk/agents/revops-and-kpi-manager:/build/deploy/bytedesk/agents/sales-enablement-lead:/build/deploy/bytedesk/agents/seo-geo-growth-lead:/build/deploy/bytedesk/agents/video-content-producer:/build/deploy/bytedesk/agents/web-design-director:/build/deploy/bytedesk/agents/web-development-lead:/build/deploy/bytedesk/agents/website-request-normalizer:/build/deploy/bytedesk/agents/website-design-quality-gate:/build/deploy/bytedesk/agents/website-html-quality-gate:/build/deploy/bytedesk/agents/website-delivery-quality-gate:/build/deploy/bytedesk/agents/website-design-to-zip-blueprint-factory:/build/deploy/bytedesk/agents/inbox-demo:/build/deploy/bytedesk/agents/activation-flow-spec-pipeline:/build/deploy/bytedesk/agents/agent-org-health-review:/build/deploy/bytedesk/agents/agent-workload-rebalance:/build/deploy/bytedesk/agents/client-onboarding-drive-provisioning:/build/deploy/bytedesk/agents/coordination-failure-detector:/build/deploy/bytedesk/agents/delivery-sequencing-standup:/build/deploy/bytedesk/agents/demo-experience-builder:/build/deploy/bytedesk/agents/demo-to-close-pipeline:/build/deploy/bytedesk/agents/demo-video-and-launch-asset-factory:/build/deploy/bytedesk/agents/design-system-activation-review:/build/deploy/bytedesk/agents/devproject-change-request:/build/deploy/bytedesk/agents/devprojects-demo-asset-factory:/build/deploy/bytedesk/agents/devprojects-deploy-reliability-watch:/build/deploy/bytedesk/agents/devprojects-seo-positioning-engine:/build/deploy/bytedesk/agents/engineering-runbook-and-mcp-docs-factory:/build/deploy/bytedesk/agents/escalation-incident-bridge:/build/deploy/bytedesk/agents/first-customer-roadmap-triage:/build/deploy/bytedesk/agents/first-customer-warroom:/build/deploy/bytedesk/agents/geo-cited-content-pipeline:/build/deploy/bytedesk/agents/goal-triage-router:/build/deploy/bytedesk/agents/icp-prospect-pipeline:/build/deploy/bytedesk/agents/new-agent-onboarding:/build/deploy/bytedesk/agents/onboarding-to-first-value:/build/deploy/bytedesk/agents/outreach-drafting-pipeline:/build/deploy/bytedesk/agents/release-readiness-quality-gate:/build/deploy/bytedesk/agents/request-intake-spec-synthesizer:/build/deploy/bytedesk/agents/research-triage-handoff:/build/deploy/bytedesk/agents/retention-risk-radar:/build/deploy/bytedesk/agents/revops-kpi-cockpit:/build/deploy/bytedesk/agents/role-clarity-ownership-map:/build/deploy/bytedesk/agents/seo-geo-growth-program:/build/deploy/bytedesk/agents/signup-to-first-value-lifecycle:/build/deploy/bytedesk/agents/source-map-coverage-sweep:/build/deploy/bytedesk/agents/stripe-billing-go-live-gate:/build/deploy/bytedesk/agents/stripe-go-live-billing:/build/deploy/bytedesk/agents/support-to-delivery-ticket-bridge:/build/deploy/bytedesk/agents/support-triage-resolution:/build/deploy/bytedesk/agents/target-account-intel-pack:/build/deploy/bytedesk/agents/trial-activation-first-value:/build/deploy/bytedesk/agents/wedge-bet-deliberation:/build/deploy/bytedesk/agents/wedge-fit-account-brief:/build/deploy/bytedesk/agents/wedge-strategy-deliberation:/build/deploy/bytedesk/agents/weekly-architecture-audit:/build/deploy/bytedesk/agents/weekly-business-review:/build/deploy/bytedesk/agents/weekly-mission-kpi-reporting:/build/deploy/bytedesk/agents/kade-vector:/build/deploy/bytedesk/agents/skills-concierge:/build/deploy/bytedesk/agents/demo-team-idea-collection:/build/deploy/bytedesk/agents/demo-motto-drafting:/build/deploy/bytedesk/agents/blueprint-playground-team-motto:/build/deploy/bytedesk/agents/goal-commander"
            # Goal Engine arming gate (BDP-2599 Wave 6). full_auto is the
            # high-blast-radius arm switch; goal_set_posture / set_autonomy_posture
            # only let an org flip to full_auto when THIS is set. The actual arm is
            # per-tenant (the goals.autonomy.posture runtime flag in NATS KV, scoped
            # to the founder org "omnigent"); every other tenant stays gated. Unset
            # this to disarm the whole fleet (fail-closed) without touching posture.
            - name: BYTEDESK_GOALS_ARMING_ENABLED
              value: "1"
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            # First boot runs Alembic migrations before listening — give it room.
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              # BDP-2206 — the control-plane server holds session/conversation
              # state, the spawn-tree, the SSE relay fan-out, and the SoT for the
              # whole agent fleet; under concurrent multi-agent delegations its
              # 1Gi/1cpu cap was far too small. Make it hefty: 4 CPU / 12Gi.
              cpu: "4"
              memory: 12Gi
          volumeMounts:
            - name: config
              mountPath: /etc/omnigent
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: omnigent-config
