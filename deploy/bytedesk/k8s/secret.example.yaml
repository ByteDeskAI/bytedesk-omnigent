# LOCAL ONLY. Copy to secret.yaml, fill values, `kubectl apply -f secret.yaml`.
# secret.yaml is gitignored (deploy/bytedesk/.gitignore) — never commit real secrets.
# In PROD these are Infisical-operator / SOPS-reconciled into the bytedesk namespace
# (mirror OpenClaw's bytedesk-openclaw-secrets) — the fleet overlay does NOT carry them.
#
# Generate: POSTGRES_PASSWORD=$(openssl rand -hex 24)
---
apiVersion: v1
kind: Secret
metadata:
  name: omnigent-secrets
  namespace: bytedesk
type: Opaque
stringData:
  # Postgres (omnigent-postgres StatefulSet)
  POSTGRES_USER: omnigent
  POSTGRES_DB: omnigent
  POSTGRES_PASSWORD: "CHANGE-ME"
  # Server DB URL — matches the creds above + the headless service DNS.
  # entrypoint normalizes postgresql:// → postgresql+psycopg:// automatically.
  DATABASE_URL: "postgresql+psycopg://omnigent:CHANGE-ME@omnigent-postgres.bytedesk.svc.cluster.local:5432/omnigent"
  # Unused while OMNIGENT_AUTH_ENABLED=0; required once auth is turned on.
  OMNIGENT_ACCOUNTS_COOKIE_SECRET: "unused-until-auth-enabled"
---
# RUNNER inference credentials (the Codex path). The SERVER never needs these.
apiVersion: v1
kind: Secret
metadata:
  name: omnigent-runner-secrets
  namespace: bytedesk
type: Opaque
stringData:
  # ── Option B (recommended Phase-0 goal): openai-agents harness → ByteDesk's
  #    OpenAI-compatible Codex inference gateway. A chat/completions gateway
  #    REQUIRES USE_RESPONSES=0 (the Responses-wire default would 404). ──────────
  HARNESS_OPENAI_AGENTS_GATEWAY_BASE_URL: "FILL-ME-https://<codex-gateway-host>/v1"
  HARNESS_OPENAI_AGENTS_API_KEY: "FILL-ME-from-Infisical"
  HARNESS_OPENAI_AGENTS_USE_RESPONSES: "0"
  HARNESS_OPENAI_AGENTS_MODEL: "gpt-5.5"
  # ── Option A (fastest sanity check the FORK runs): a direct provider key.
  #    Uncomment one + clear Option B, and set the agent harness accordingly. ────
  # OPENAI_API_KEY: "sk-..."
  # ANTHROPIC_API_KEY: "sk-ant-..."
