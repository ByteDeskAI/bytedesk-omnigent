# SHARED LLM / AI provider credentials for ALL host replicas.
# Copy → host-credentials.yaml (gitignored), fill, `kubectl apply -f`.
# Every omnigent-host pod `envFrom`s this ONE Secret, and the host forwards these
# names to every runner/agent it spawns (omnigent/host/connect.py HARNESS_CREDENTIAL_ENV_VARS).
# So configuring inference once here applies to the whole host pool.
#
# In PROD this Secret is Infisical-operator/SOPS-reconciled into the bytedesk ns
# (mirror bytedesk-openclaw-secrets); the Fleet bundle does NOT carry it.
apiVersion: v1
kind: Secret
metadata:
  name: omnigent-host-credentials
  namespace: bytedesk
type: Opaque
stringData:
  # Pick the provider(s) you want every host to use. All are forwarded by default.
  # OpenAI (or any OpenAI-compatible gateway — set OPENAI_BASE_URL for ByteDesk's Codex gw):
  OPENAI_API_KEY: "REPLACE-ME"
  # OPENAI_BASE_URL: "https://<codex-gateway-host>/v1"   # openai-agents → gateway
  # Anthropic (claude-sdk):
  # ANTHROPIC_API_KEY: "REPLACE-ME"
  # GEMINI_API_KEY: "REPLACE-ME"
  #
  # NOTE: the InfisicalBackend bootstrap creds (BDP-2303,
  # INFISICAL_UNIVERSAL_AUTH_CLIENT_ID/SECRET) are NOT here — they are
  # operator-hydrated into `omnigent-infisical-secrets` from Infisical
  # bytedesk-ai /omnigent-infisical (see omnigent-infisical-secret.yaml), so they
  # persist via Fleet/GitOps in both clusters with no manual step.
