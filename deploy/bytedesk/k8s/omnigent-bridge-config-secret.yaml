# Infisical-operator-managed config for the ByteDesk realtime agent bridge
# (BDP-2301). The bridge (bytedesk_omnigent/realtime) publishes agent
# roster/presence deltas to the platform `office:agents:{tenant}` Redis channel;
# it needs the ByteDesk org tenant GUID. Rather than couple the bridge to the
# in-app secret store, we inject the value as a plain env var via the Infisical
# operator (the bridge reads os.getenv("BYTEDESK_TENANT_ID")).
#
#   Source of truth: Infisical project `bytedesk-agent-configuration`,
#   path `/realtime` (env development; the fleet/production overlay must patch
#   envSlug -> production and the prod project must carry the prod tenant).
#   Holds only BYTEDESK_TENANT_ID — scoped to /realtime so the operator does NOT
#   pull the agents' keychain secrets (those stay in-app via the secret store).
#
# NEVER hand-create `omnigent-bridge-config-secrets` — the operator owns it
# (creationPolicy: Owner). Rotate by changing the value in Infisical; the
# operator re-hydrates and the host picks it up on restart.
#
# Mirrors omnigent-infisical-secret.yaml; reuses the same operator machine
# identity (`bytedesk-secrets`).
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: omnigent-bridge-config
  namespace: bytedesk
spec:
  authentication:
    universalAuth:
      credentialsRef:
        secretName: bytedesk-secrets
        secretNamespace: bytedesk
      secretsScope:
        envSlug: development
        projectSlug: bytedesk-agent-configuration
        recursive: false
        secretsPath: /realtime
  hostAPI: https://infisical.prod.bytedesk.ai/api
  managedSecretReference:
    creationPolicy: Owner
    secretName: omnigent-bridge-config-secrets
    secretNamespace: bytedesk
    secretType: Opaque
  resyncInterval: 60
