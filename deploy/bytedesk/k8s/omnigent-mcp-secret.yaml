# Infisical-operator-managed MCP client secret for omnigent agents (BDP-2169, ADR-0138).
#
# The generic `oauth` MCP auth provider (BDP-2182) on Maya's `bytedesk-platform`
# tool reads OMNIGENT_MCP_CLIENT_SECRET (mapped onto omnigent-server, see
# server.yaml) to mint client_credentials JWTs against ByteDesk.Identity.
#
# Source of truth: Infisical project `bytedesk-ai`, path `/omnigent-mcp`.
#   • LOCAL: envSlug `development` (this base).
#   • PROD : the fleet/production overlay patches envSlug -> `prod`.
#
# NEVER hand-create `omnigent-mcp-secrets` — the operator owns it
# (creationPolicy: Owner). Rotate by changing the value in Infisical; the
# operator re-hydrates and consumers pick it up on restart.
#
# Mirrors the existing `bytedesk-openclaw-config` InfisicalSecret CR; the
# universal-auth machine-identity credentials live in `bytedesk-secrets`.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: omnigent-mcp
  namespace: bytedesk
spec:
  authentication:
    universalAuth:
      credentialsRef:
        secretName: bytedesk-secrets
        secretNamespace: bytedesk
      secretsScope:
        envSlug: development
        projectSlug: bytedesk-ai
        recursive: false
        secretsPath: /omnigent-mcp
  hostAPI: https://infisical.prod.bytedesk.ai/api
  managedSecretReference:
    creationPolicy: Owner
    secretName: omnigent-mcp-secrets
    secretNamespace: bytedesk
    secretType: Opaque
  resyncInterval: 60
