# Dedicated Postgres for omnigent — self-contained, like OpenClaw keeps its own
# PVC state rather than sharing the platform DB. Keeps the evaluation decoupled
# from the platform's primary Bitnami Postgres (clean teardown, independent
# lifecycle). Single-replica matches omnigent's own single-replica server ceiling.
apiVersion: v1
kind: Service
metadata:
  name: omnigent-postgres
  labels:
    app.kubernetes.io/name: omnigent-postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: omnigent-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: omnigent-postgres
  labels:
    app.kubernetes.io/name: omnigent-postgres
spec:
  serviceName: omnigent-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omnigent-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omnigent-postgres
    spec:
      containers:
        - name: postgres
          # pgvector image (PG16 + the `vector` extension) so the FU1 agent-memory
          # plane (ADR-0132, BDP-2457) can build the vector(384) column + ivfflat
          # index for SEMANTIC recall. Plain postgres:16-alpine ships no pgvector,
          # so add_memory_tables probed, found none, and left recall lexical-only.
          # Same PG16 major → the existing PGDATA volume mounts unchanged.
          # ponytail: debian (glibc) vs the old alpine (musl) — on an existing prod
          # volume, REINDEX collation-sensitive text indexes after the swap.
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: omnigent-secrets # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["sh", "-c", 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"']
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
