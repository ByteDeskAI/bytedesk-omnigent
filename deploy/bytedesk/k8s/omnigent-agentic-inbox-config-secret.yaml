# Infisical-operator-managed Agentic Inbox MCP config for persona agents.
#
# Source of truth: Infisical project `bytedesk-agent-configuration`,
# path `/agentic-inbox`.
#   • LOCAL/DEV: envSlug `development` (this base).
#   • PROD     : the fleet/production overlay patches envSlug -> `production`.
#
# Expected keys in the selected environment/path:
#   AGENTIC_INBOX_MCP_URL
#   AGENTIC_INBOX_EMAIL_DOMAIN
#   AGENTIC_INBOX_CF_ACCESS_CLIENT_ID
#   AGENTIC_INBOX_CF_ACCESS_CLIENT_SECRET
#   OMNIGENT_AGENTIC_INBOX_WEBHOOK_SECRET
#
# The server consumes the webhook secret to verify Agentic Inbox email.received
# events. The server and host consume the AGENTIC_INBOX_* values so persisted
# template-agent images can reference them; the host passes only those MCP values
# through to spawned runners.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: omnigent-agentic-inbox-config
  namespace: bytedesk
spec:
  authentication:
    universalAuth:
      credentialsRef:
        secretName: bytedesk-secrets
        secretNamespace: bytedesk
      secretsScope:
        envSlug: development
        projectSlug: bytedesk-agent-configuration
        recursive: false
        secretsPath: /agentic-inbox
  hostAPI: https://infisical.prod.bytedesk.ai/api
  managedSecretReference:
    creationPolicy: Owner
    secretName: agentic-inbox-config-secrets
    secretNamespace: bytedesk
    secretType: Opaque
  resyncInterval: 60
