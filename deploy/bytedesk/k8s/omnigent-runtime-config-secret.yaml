# Infisical-operator-managed Omnigent runtime config.
#
# Source of truth: Infisical project `bytedesk-agent-configuration`,
# path `/runtime`.
#   - LOCAL/DEV: envSlug `development` (this base).
#   - PROD: the fleet/production overlay patches envSlug -> `production`.
#
# Expected keys:
#   OMNIGENT_NATS_URL
#
# The server consumes OMNIGENT_NATS_URL for coordination/runtime flags/runner
# request-reply. The host consumes the same value and passes only that key name
# through to spawned runners so runner control traffic uses the NATS substrate
# without baking the URL into agent specs or Kubernetes manifests.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: omnigent-runtime-config
  namespace: bytedesk
spec:
  authentication:
    universalAuth:
      credentialsRef:
        secretName: bytedesk-secrets
        secretNamespace: bytedesk
      secretsScope:
        envSlug: development
        projectSlug: bytedesk-agent-configuration
        recursive: false
        secretsPath: /runtime
  hostAPI: https://infisical.prod.bytedesk.ai/api
  managedSecretReference:
    creationPolicy: Owner
    secretName: omnigent-runtime-config-secrets
    secretNamespace: bytedesk
    secretType: Opaque
  resyncInterval: 60
