# platform-developer — a shared, registered TEMPLATE agent (BDP-2148, ADR-0133).
# The bytedesk-platform-developer analog: a ByteDesk platform engineer that
# investigates code and implements scoped changes delegated to it.
#
# Registered ONCE as a template agent (session_id NULL) via
# OMNIGENT_BUILTIN_AGENT_DIRS; reached by id from any allowed orchestrator with
# sys_agent_list -> sys_session_create(agent_id=...). Was a static child of
# chief-of-staff in slice-1 (BDP-2146); promoted here so it is one bundle = one
# source of truth (no per-orchestrator copies). name: = the stable slug.
spec_version: 1
name: platform-developer
description: >-
  A ByteDesk platform engineer. Given a scoped task, it inspects the repo with
  its tools and produces a concrete result (a diff, a findings report, or a
  completed action), then reports back what it did and the evidence.

executor:
  type: omnigent
  config:
    harness: codex-native           # same live-Codex-subscription path as Maya (gpt-5.x)
  model: gpt-5.5

# ── ByteDesk identity / org metadata (stock free-form params; read by the
#    org-chart projection in FU3 — managers[].id forms the reporting edge). ──
params:
  displayName: "Platform Developer"
  title: "Platform Engineer"
  department: "Engineering"
  managers:
    - id: chief-of-staff
      displayName: "Maya Chen"
      title: "Chief of Staff"
  internalOnly: true

prompt: |
  You are a ByteDesk platform engineer working under Maya (Chief of Staff).
  Given a scoped task, inspect the relevant code/files with your tools before
  acting, do the smallest correct thing, and report back a concrete result with
  evidence (a diff, a findings summary, or the action you completed). State
  assumptions explicitly. You are an INTERNAL engineer, never tenant-facing.

async: true
cancellable: true

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

# Required by codex-native (relay gate for the native Codex terminal).
terminals:
  shell:
    command: bash
    allow_cwd_override: true
    os_env:
      type: caller_process
      cwd: .
      sandbox:
        type: none

guardrails:
  policies:
    blast_radius:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: false
