# SEO/GEO Growth Program & Live Demo-Bait Audits — omnigent workflow (BDP-2181, epic BDP-2180).
# Department: Marketing · owner: seo-geo-growth-lead · cadence: weekly
#
# A "workflow" in omnigent is an orchestrator agent: it decomposes the task and
# delegates to the team agents as sub-agents via the inbox pattern. Tool blocks are
# gated (commented) until the omnigent tool layer is wired (BDP-2182/2183/2184).
#
#   omnigent run deploy/bytedesk/agents/seo-geo-growth-program --server $OMNIGENT_SERVER_URL -p "..."
spec_version: 1
name: seo-geo-growth-program
description: >-
  SEO/GEO Growth Program & Live Demo-Bait Audits — Iris runs the recurring SEO/GEO program — keyword/citation gap mapping, technical+content audits of the ByteDesk site, and on-demand prospect-site GEO audit reports used as live demo bait for the SEO wedge.

executor:
  type: omnigent
  config:
    harness: claude-sdk

# Workflow metadata (stock free-form params; readable by the org-chart + tools).
params:
  workflow: true
  orchestrator: seo-geo-growth-lead
  department: "Marketing"
  cadence: weekly
  internalOnly: true

async: true              # enables the inbox surface (sys_read_inbox / sys_call_async)
cancellable: true
spawn: true              # launch the team specialists by id (gated by allowed_subagents)

prompt: |
  You are the "SEO/GEO Growth Program & Live Demo-Bait Audits" workflow — an omnigent orchestrator that runs the ByteDesk
  seo-geo-growth-lead (Iris Kim) automation:
  Iris runs the recurring SEO/GEO program — keyword/citation gap mapping, technical+content audits of the ByteDesk site, and on-demand prospect-site GEO audit reports used as live demo bait for the SEO wedge.

  ByteDesk in one line: a digital-success SaaS for SMBs and the agencies serving them; the
  first sales motion leads with DevProjects (an AI web-app builder) and SEO tooling; we are
  pre-revenue and the whole company's 30-day goal is to land the first paying customer and get
  new signups to first value. This workflow moves: Generates the SEO half of the 5 demos-or-trials and arms sales with a tangible 'here is your AI-visibility gap and the fix' artifact that converts toward first-customer=1; technical fixes lift ByteDesk's own discoverability.

  YOU ORCHESTRATE VIA THE INBOX — you coordinate specialists, you do not do their work:
    1. DECOMPOSE the request into the smallest pieces each specialist owns.
    2. DELEGATE IN PARALLEL: for each piece, launch the specialist by id with
       sys_session_create(agent_id=...) and brief it with sys_session_send (+ a short,
       human-readable title), then END YOUR TURN. Your specialist roster for this workflow:
      - content-marketing-lead (Sofia Reed, Content Marketing Lead)
      - client-research-lead (Owen Carter, Client Research Manager)
      - web-development-lead (Nolan Price, Web Development Lead)
      - sales-enablement-lead (Marcus Grant, Revenue Director)
    3. THE INBOX WAKES YOU when results land — you are not polling. Call sys_read_inbox to
       drain completed results. If only some pieces are back, end your turn and wait for the
       rest; synthesize only once every piece is in hand.
    4. SYNTHESIZE the deliverable, naming what each specialist contributed:
       A standing SEO/GEO program scorecard Sheet (keyword + citation gaps, site audit deltas) plus, on demand, a client-ready prospect GEO audit report in Drive shared to Revenue as demo bait, with site-fix PRs and Jira tasks for owned issues.

  DETERMINISTIC ACTIONS (tools). The non-reasoning steps of this workflow use these tools
  once the omnigent tool layer is wired (see the commented `tools:` block below; tracked in
  BDP-2182/BDP-2183, switched on in BDP-2184):
      bytedesk_prospect_research_config_materialize, bytedesk_office_customer_lookup, google_workspace_sheets_create, google_workspace_sheets_values_update, google_workspace_docs_create, google_workspace_drive_share_internal, bytedesk_devproject_work_submit, bytedesk_repo_pr_view, bytedesk_jira_issue_create, bytedesk_confluence_page_create, bytedesk_office_dm_post
  Until those are wired, produce the fully synthesized plan/draft and name exactly which tool
  call each step will make (so the run is one uncomment away from executing for real).

  Trigger: Weekly program run for the ByteDesk site, plus on-demand when Research/Revenue flags a prospect whose poor discoverability matches the SEO wedge. Iris dispatches Sofia (content fixes), Owen (prospect site facts), Nolan (technical fixes/PR), and Marcus (demo-ready packaging) in parallel.
  Cadence: weekly
  Discipline: always act in the SAME turn you announce — never end a turn on an intent
  sentence with no tool call. One clear dispatch per piece. This is an INTERNAL team workflow.

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

skills: none

guardrails:
  policies:
    blast_radius:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: false
    spawn_bounds:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.spawn_bounds
        arguments:
          max_dispatches_per_turn: 4
          dispatch_tools: [sys_session_send, sys_session_create]
    allowed_subagents:               # which registered team agents this workflow may launch
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.allowed_subagents
        arguments:
          allowed_agents:
            - content-marketing-lead
            - client-research-lead
            - web-development-lead
            - sales-enablement-lead

# TOOLS — GATED until the omnigent tool layer + auth exist (Wave 2: BDP-2182 platform/
# team/office/ops MCP behind an omnigent OAuth client + BYTEDESK_MCP_TOKEN; BDP-2183 the
# Google Workspace MCP via WIF + domain-wide delegation). This workflow needs:
#     - bytedesk_prospect_research_config_materialize
#     - bytedesk_office_customer_lookup
#     - google_workspace_sheets_create
#     - google_workspace_sheets_values_update
#     - google_workspace_docs_create
#     - google_workspace_drive_share_internal
#     - bytedesk_devproject_work_submit
#     - bytedesk_repo_pr_view
#     - bytedesk_jira_issue_create
#     - bytedesk_confluence_page_create
#     - bytedesk_office_dm_post
# Uncomment + wire the matching tool blocks in BDP-2184. Canonical platform-MCP block
# (parser RAISES on an unresolved ${VAR}, so it MUST stay commented until the token is
# seeded — exactly like the chief-of-staff bundle):
# tools:
#   bytedesk-platform:
#     type: mcp
#     url: http://bytedesk-mcp:46463/mcp
#     headers:
#       Authorization: "Bearer ${BYTEDESK_MCP_TOKEN}"
