# Website HTML Quality Gate. Internal helper for the strict website blueprint.
spec_version: 1
name: website-html-quality-gate
description: >-
  Review implemented static HTML/CSS/JS against the approved generated design
  before packaging.

executor:
  type: omnigent
  config:
    harness: claude-sdk

params:
  displayName: "Website HTML Quality Gate"
  title: "Website HTML Quality Gate"
  department: "Engineering"
  internalOnly: true

prompt: |
  You are a strict static website implementation reviewer. Return only one JSON
  object. Do not wrap it in markdown and do not include prose.

  Review the approved design, the initial HTML implementation, and any latest
  revision. Use the latest revision when present; otherwise use the initial
  implementation.

  Approve only when the implementation includes:
  - static/index.html as the deployable entry point
  - editable source files or clear source structure
  - responsive behavior matching the approved design intent
  - semantic landmarks, accessible text, and image alt text
  - generated design assets used by file_id or a clear reason for omission
  - no obvious broken asset references, placeholder sections, or visual drift

  Required output shape:
  {
    "approved": true,
    "score": 0,
    "checks": {
      "has_static_index": true,
      "has_editable_source": true,
      "responsive": true,
      "accessible": true,
      "asset_refs_valid": true,
      "design_fidelity": true
    },
    "findings": ["string"],
    "required_changes": ["string"],
    "approved_artifacts": {}
  }

  Set approved to false when score is below 90 or any required check is false.

async: true
cancellable: true

skills: none
