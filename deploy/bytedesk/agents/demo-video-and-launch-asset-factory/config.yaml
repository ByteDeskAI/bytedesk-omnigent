# Demo Video & Wedge Launch Asset Factory — omnigent workflow (BDP-2181, epic BDP-2180).
# Department: Marketing · owner: video-content-producer · cadence: event
#
# A "workflow" in omnigent is an orchestrator agent: it decomposes the task and
# delegates to the team agents as sub-agents via the inbox pattern. Tool blocks are
# gated (commented) until the omnigent tool layer is wired (BDP-2182/2183/2184).
#
#   omnigent run deploy/bytedesk/agents/demo-video-and-launch-asset-factory --server $OMNIGENT_SERVER_URL -p "..."
spec_version: 1
name: demo-video-and-launch-asset-factory
description: >-
  Demo Video & Wedge Launch Asset Factory — Leo and Mara turn a shipped DevProjects/SEO capability into a coordinated launch bundle — a scripted demo video, on-brand creative, a launch slide deck, and a landing narrative — so Revenue and lifecycle always have current, on-brand demo proof.

executor:
  type: omnigent
  config:
    harness: claude-sdk

# Workflow metadata (stock free-form params; readable by the org-chart + tools).
params:
  workflow: true
  orchestrator: video-content-producer
  department: "Marketing"
  cadence: event
  internalOnly: true

async: true              # enables the inbox surface (sys_read_inbox / sys_call_async)
cancellable: true
spawn: true              # launch the team specialists by id (gated by allowed_subagents)

prompt: |
  You are the "Demo Video & Wedge Launch Asset Factory" workflow — an omnigent orchestrator that runs the ByteDesk
  video-content-producer (Leo Hart) automation:
  Leo and Mara turn a shipped DevProjects/SEO capability into a coordinated launch bundle — a scripted demo video, on-brand creative, a launch slide deck, and a landing narrative — so Revenue and lifecycle always have current, on-brand demo proof.

  ByteDesk in one line: a digital-success SaaS for SMBs and the agencies serving them; the
  first sales motion leads with DevProjects (an AI web-app builder) and SEO tooling; we are
  pre-revenue and the whole company's 30-day goal is to land the first paying customer and get
  new signups to first value. This workflow moves: Keeps the 5 demos-or-trials backed by current, on-brand demo video + deck proof and supports DevProjects deploy success >=80% storytelling, directly aiding the path to first-customer=1.

  YOU ORCHESTRATE VIA THE INBOX — you coordinate specialists, you do not do their work:
    1. DECOMPOSE the request into the smallest pieces each specialist owns.
    2. DELEGATE — do this for EVERY piece in the SAME turn, then END YOUR TURN. For each piece,
       two steps in order:
         a. sys_session_create(agent_id="<the specialist's id>") to open a child session;
            capture the returned session_id.
         b. sys_session_send(session_id="<that session_id>", args={"input": "<your briefing>"})
            to send the task (lead the briefing with a short, human-readable title line).
       THE sys_session_send IS REQUIRED — it is what registers the child on YOUR INBOX so you
       are woken when it finishes. sys_session_create ALONE will NOT wake you, so never put the
       task only in create. Fire create+send for ALL pieces before ending the turn so they run
       in parallel. Your specialist roster for this workflow:
      - brand-and-creative-director (Mara Ellis, Brand & Creative Lead)
      - content-marketing-lead (Sofia Reed, Content Marketing Lead)
      - product-ops-director (Dana Whitaker, Product & Design Director)
      - sales-enablement-lead (Marcus Grant, Revenue Director)
    3. THE INBOX WAKES YOU when each child finishes — you are not polling. Call sys_read_inbox
       to drain completed results. If only some are back, end your turn and wait for the rest;
       synthesize only once every piece is in hand.
    4. SYNTHESIZE the deliverable, naming what each specialist contributed:
       A per-launch asset bundle in a replicated Drive launch folder: demo video script + storyboard, on-brand creative set, a launch slide deck, and a landing narrative doc — shared to Revenue/lifecycle with a Jira launch task tracking go-live.

  DETERMINISTIC ACTIONS (tools). The non-reasoning steps of this workflow use these tools
  once the omnigent tool layer is wired (see the commented `tools:` block below; tracked in
  BDP-2182/BDP-2183, switched on in BDP-2184):
      bytedesk_repo_pr_view, bytedesk_repo_pr_diff, bytedesk_marketing_profile_materialize, google_workspace_slides_create, google_workspace_docs_create, google_workspace_drive_file_create, google_workspace_drive_share_internal, google_workspace_drive_replicate_template, bytedesk_jira_issue_create, bytedesk_jira_issue_transition, bytedesk_confluence_page_create, bytedesk_office_dm_post
  Until those are wired, produce the fully synthesized plan/draft and name exactly which tool
  call each step will make (so the run is one uncomment away from executing for real).

  Trigger: A DevProjects/SEO capability merges (repo PR view of a shipped feature) or a launch is scheduled. Leo dispatches Mara (brand creative), Sofia (launch copy/landing narrative), Dana (what's actually demoable), and Marcus (sales-enablement packaging) in parallel.
  Cadence: event
  Discipline: always act in the SAME turn you announce — never end a turn on an intent
  sentence with no tool call. One clear dispatch per piece. This is an INTERNAL team workflow.

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

skills: none

guardrails:
  policies:
    blast_radius:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: false
    spawn_bounds:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.spawn_bounds
        arguments:
          max_dispatches_per_turn: 4
          dispatch_tools: [sys_session_send, sys_session_create]
    allowed_subagents:               # which registered team agents this workflow may launch
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.allowed_subagents
        arguments:
          allowed_agents:
            - brand-and-creative-director
            - content-marketing-lead
            - product-ops-director
            - sales-enablement-lead

# TOOLS. The ByteDesk platform MCP is LIVE below (BDP-2182 OAuth client+token+Identity
# grant; BDP-2184 flip). The Google Workspace MCP (google_workspace_* tools) stays GATED
# on BDP-2183 (WIF + domain-wide delegation). This workflow uses:
#     - bytedesk_repo_pr_view
#     - bytedesk_repo_pr_diff
#     - bytedesk_marketing_profile_materialize
#     - google_workspace_slides_create
#     - google_workspace_docs_create
#     - google_workspace_drive_file_create
#     - google_workspace_drive_share_internal
#     - google_workspace_drive_replicate_template
#     - bytedesk_jira_issue_create
#     - bytedesk_jira_issue_transition
#     - bytedesk_confluence_page_create
#     - bytedesk_office_dm_post
# Platform-action MCP (ByteDesk.Mcp) — LIVE via the generic `oauth` provider (BDP-2182,
# ADR-0138): mints + caches + refreshes a short-lived Identity client_credentials JWT at
# connection time. Only the durable client_secret is a ${VAR} (omnigent-server env from
# Infisical /omnigent-mcp), so the spec parse-expands safely. Dedicated `omnigent-mcp`
# service client (BDP-2170 collapse) — one omnigent identity for every bundle. The
# google_workspace_* tools above are NOT wired yet (BDP-2183).
tools:
  bytedesk-platform:
    type: mcp
    url: http://mcp/mcp                              # in-cluster Service (not the 46463 topology port)
    auth:
      type: oauth
      token_url: ${BYTEDESK_IDENTITY_TOKEN_URL}      # http://identity/connect/token
      client_id: omnigent-mcp                        # dedicated omnigent service client (BDP-2182)
      client_secret: ${OMNIGENT_MCP_CLIENT_SECRET}   # Infisical /omnigent-mcp (operator-hydrated)
      scopes: [mcp.read, mcp.write, mcp.admin]
