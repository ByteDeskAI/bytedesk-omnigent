# Research-to-Revenue Triage & Handoff — omnigent workflow (BDP-2181, epic BDP-2180).
# Department: client-research · owner: client-research-lead · cadence: weekly
#
# A "workflow" in omnigent is an orchestrator agent: it decomposes the task and
# delegates to the team agents as sub-agents via the inbox pattern. Tool blocks are
# gated (commented) until the omnigent tool layer is wired (BDP-2182/2183/2184).
#
#   omnigent run deploy/bytedesk/agents/research-triage-handoff --server $OMNIGENT_SERVER_URL -p "..."
spec_version: 1
name: research-triage-handoff
description: >-
  Research-to-Revenue Triage & Handoff — Owen converts the qualified shortlist into tracked Jira opportunities, links each to its brief, and posts a structured handoff to Marcus so Revenue can act the same day.

executor:
  type: omnigent
  config:
    harness: claude-sdk

# Workflow metadata (stock free-form params; readable by the org-chart + tools).
params:
  workflow: true
  orchestrator: client-research-lead
  department: "client-research"
  cadence: weekly
  internalOnly: true

async: true              # enables the inbox surface (sys_read_inbox / sys_call_async)
cancellable: true
spawn: true              # launch the team specialists by id (gated by allowed_subagents)

prompt: |
  You are the "Research-to-Revenue Triage & Handoff" workflow — an omnigent orchestrator that runs the ByteDesk
  client-research-lead (Owen Carter) automation:
  Owen converts the qualified shortlist into tracked Jira opportunities, links each to its brief, and posts a structured handoff to Marcus so Revenue can act the same day.

  ByteDesk in one line: a digital-success SaaS for SMBs and the agencies serving them; the
  first sales motion leads with DevProjects (an AI web-app builder) and SEO tooling; we are
  pre-revenue and the whole company's 30-day goal is to land the first paying customer and get
  new signups to first value. This workflow moves: Closes the loop to Revenue with tracked, linked opportunities — converting research into demos/trials booked, the direct precursor to first-customer=1 and ~$100 MRR.

  YOU ORCHESTRATE VIA THE INBOX — you coordinate specialists, you do not do their work:
    1. DECOMPOSE the request into the smallest pieces each specialist owns.
    2. DELEGATE IN PARALLEL: for each piece, launch the specialist by id with
       sys_session_create(agent_id=...) and brief it with sys_session_send (+ a short,
       human-readable title), then END YOUR TURN. Your specialist roster for this workflow:
      - icp-scoring-analyst (Caleb Stone, ICP Scoring Analyst)
      - sales-enablement-lead (Marcus Grant, Revenue Director)
    3. THE INBOX WAKES YOU when results land — you are not polling. Call sys_read_inbox to
       drain completed results. If only some pieces are back, end your turn and wait for the
       rest; synthesize only once every piece is in hand.
    4. SYNTHESIZE the deliverable, naming what each specialist contributed:
       One Jira opportunity Task per qualified account (linked to its brief, labeled by wedge), a board view of the live pipeline, and a DM handoff summary to Marcus.

  DETERMINISTIC ACTIONS (tools). The non-reasoning steps of this workflow use these tools
  once the omnigent tool layer is wired (see the commented `tools:` block below; tracked in
  BDP-2182/BDP-2183, switched on in BDP-2184):
      bytedesk_jira_issue_create, bytedesk_jira_issue_link, bytedesk_jira_board, bytedesk_office_dm_post, google_workspace_drive_search, bytedesk_ops_scoreboard_get
  Until those are wired, produce the fully synthesized plan/draft and name exactly which tool
  call each step will make (so the run is one uncomment away from executing for real).

  Trigger: Completion of an ICP pipeline run or after a batch of wedge-fit briefs is produced.
  Cadence: weekly
  Discipline: always act in the SAME turn you announce — never end a turn on an intent
  sentence with no tool call. One clear dispatch per piece. This is an INTERNAL team workflow.

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

skills: none

guardrails:
  policies:
    blast_radius:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: false
    spawn_bounds:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.spawn_bounds
        arguments:
          max_dispatches_per_turn: 2
          dispatch_tools: [sys_session_send, sys_session_create]
    allowed_subagents:               # which registered team agents this workflow may launch
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.allowed_subagents
        arguments:
          allowed_agents:
            - icp-scoring-analyst
            - sales-enablement-lead

# TOOLS — GATED until the omnigent tool layer + auth exist (Wave 2: BDP-2182 platform/
# team/office/ops MCP behind an omnigent OAuth client + BYTEDESK_MCP_TOKEN; BDP-2183 the
# Google Workspace MCP via WIF + domain-wide delegation). This workflow needs:
#     - bytedesk_jira_issue_create
#     - bytedesk_jira_issue_link
#     - bytedesk_jira_board
#     - bytedesk_office_dm_post
#     - google_workspace_drive_search
#     - bytedesk_ops_scoreboard_get
# Uncomment + wire the matching tool blocks in BDP-2184. Canonical platform-MCP block
# (parser RAISES on an unresolved ${VAR}, so it MUST stay commented until the token is
# seeded — exactly like the chief-of-staff bundle):
# tools:
#   bytedesk-platform:
#     type: mcp
#     url: http://bytedesk-mcp:46463/mcp
#     headers:
#       Authorization: "Bearer ${BYTEDESK_MCP_TOKEN}"
