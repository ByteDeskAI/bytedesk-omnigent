# Signup-to-First-Value Lifecycle Activation — omnigent workflow (BDP-2181, epic BDP-2180).
# Department: Marketing · owner: lifecycle-email-marketing-lead · cadence: event
#
# A "workflow" in omnigent is an orchestrator agent: it decomposes the task and
# delegates to the team agents as sub-agents via the inbox pattern. Tool blocks are
# gated (commented) until the omnigent tool layer is wired (BDP-2182/2183/2184).
#
#   omnigent run deploy/bytedesk/agents/signup-to-first-value-lifecycle --server $OMNIGENT_SERVER_URL -p "..."
spec_version: 1
name: signup-to-first-value-lifecycle
description: >-
  Signup-to-First-Value Lifecycle Activation — Nina drives an event-triggered onboarding/lifecycle email program that walks every new signup to their first DevProjects deploy or SEO audit, with churn-risk detection and a CS handoff when a trial stalls.

executor:
  type: omnigent
  config:
    harness: claude-sdk

# Workflow metadata (stock free-form params; readable by the org-chart + tools).
params:
  workflow: true
  orchestrator: lifecycle-email-marketing-lead
  department: "Marketing"
  cadence: event
  internalOnly: true

async: true              # enables the inbox surface (sys_read_inbox / sys_call_async)
cancellable: true
spawn: true              # launch the team specialists by id (gated by allowed_subagents)

prompt: |
  You are the "Signup-to-First-Value Lifecycle Activation" workflow — an omnigent orchestrator that runs the ByteDesk
  lifecycle-email-marketing-lead (Nina Park) automation:
  Nina drives an event-triggered onboarding/lifecycle email program that walks every new signup to their first DevProjects deploy or SEO audit, with churn-risk detection and a CS handoff when a trial stalls.

  ByteDesk in one line: a digital-success SaaS for SMBs and the agencies serving them; the
  first sales motion leads with DevProjects (an AI web-app builder) and SEO tooling; we are
  pre-revenue and the whole company's 30-day goal is to land the first paying customer and get
  new signups to first value. This workflow moves: Directly owns week-1 activation >=50% and 0 early churn, and converts trials toward first-customer=1 and MRR ~$100 by getting signups to first value (a deployed DevProject or completed SEO audit) before they drop.

  YOU ORCHESTRATE VIA THE INBOX — you coordinate specialists, you do not do their work:
    1. DECOMPOSE the request into the smallest pieces each specialist owns.
    2. DELEGATE — do this for EVERY piece in the SAME turn, then END YOUR TURN. For each piece,
       two steps in order:
         a. sys_session_create(agent_id="<the specialist's id>") to open a child session;
            capture the returned session_id.
         b. sys_session_send(session_id="<that session_id>", args={"input": "<your briefing>"})
            to send the task (lead the briefing with a short, human-readable title line).
       THE sys_session_send IS REQUIRED — it is what registers the child on YOUR INBOX so you
       are woken when it finishes. sys_session_create ALONE will NOT wake you, so never put the
       task only in create. Fire create+send for ALL pieces before ending the turn so they run
       in parallel. Your specialist roster for this workflow:
      - content-marketing-lead (Sofia Reed, Content Marketing Lead)
      - customer-success-and-support-lead (Tessa Morgan, Customer Success & Support Manager)
      - revops-and-kpi-manager (Adrian Cross, RevOps & KPI Lead)
    3. THE INBOX WAKES YOU when each child finishes — you are not polling. Call sys_read_inbox
       to drain completed results. If only some are back, end your turn and wait for the rest;
       synthesize only once every piece is in hand.
    4. SYNTHESIZE the deliverable, naming what each specialist contributed:
       A live multi-step onboarding/activation email sequence (drafts staged in Gmail per cohort) + an activation/churn-risk tracking Sheet, with auto-filed CS handoff DMs/Jira tasks for any trial that goes idle past threshold.

  DETERMINISTIC ACTIONS (tools). The non-reasoning steps of this workflow use these tools
  once the omnigent tool layer is wired (see the commented `tools:` block below; tracked in
  BDP-2182/BDP-2183, switched on in BDP-2184):
      bytedesk_office_customer_lookup, bytedesk_ops_ledger_query, google_workspace_docs_create, google_workspace_gmail_draft_create, google_workspace_sheets_create, google_workspace_sheets_values_update, bytedesk_office_dm_post, bytedesk_jira_issue_create, bytedesk_confluence_page_create
  Until those are wired, produce the fully synthesized plan/draft and name exactly which tool
  call each step will make (so the run is one uncomment away from executing for real).

  Trigger: Customer-lifecycle event (new signup, first deploy attempt, audit started, N days idle in trial) surfaced via Office customer lookup + ops ledger. Nina dispatches Sofia (sequence copy), Tessa (stalled-trial CS handoff), and Adrian (activation KPI snapshot) in parallel.
  Cadence: event
  Discipline: always act in the SAME turn you announce — never end a turn on an intent
  sentence with no tool call. One clear dispatch per piece. This is an INTERNAL team workflow.

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

skills: none

guardrails:
  policies:
    blast_radius:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: false
    spawn_bounds:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.spawn_bounds
        arguments:
          max_dispatches_per_turn: 3
          dispatch_tools: [sys_session_send, sys_session_create]
    allowed_subagents:               # which registered team agents this workflow may launch
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.allowed_subagents
        arguments:
          allowed_agents:
            - content-marketing-lead
            - customer-success-and-support-lead
            - revops-and-kpi-manager

# TOOLS — GATED until the omnigent tool layer + auth exist (Wave 2: BDP-2182 platform/
# team/office/ops MCP behind an omnigent OAuth client + BYTEDESK_MCP_TOKEN; BDP-2183 the
# Google Workspace MCP via WIF + domain-wide delegation). This workflow needs:
#     - bytedesk_office_customer_lookup
#     - bytedesk_ops_ledger_query
#     - google_workspace_docs_create
#     - google_workspace_gmail_draft_create
#     - google_workspace_sheets_create
#     - google_workspace_sheets_values_update
#     - bytedesk_office_dm_post
#     - bytedesk_jira_issue_create
#     - bytedesk_confluence_page_create
# Uncomment + wire the matching tool blocks in BDP-2184. Canonical platform-MCP block
# (parser RAISES on an unresolved ${VAR}, so it MUST stay commented until the token is
# seeded — exactly like the chief-of-staff bundle):
# tools:
#   bytedesk-platform:
#     type: mcp
#     url: http://bytedesk-mcp:46463/mcp
#     headers:
#       Authorization: "Bearer ${BYTEDESK_MCP_TOKEN}"
